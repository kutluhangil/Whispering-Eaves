/* ------------------------------------------------------------
   4d. Generated roof photographs (assets/) — the primary renderer.
   ------------------------------------------------------------ */
const ROOF_ASSETS = {
  china:      { lg: 'assets/roof_china_lg.webp',      sm: 'assets/roof_china.webp',      png: 'assets/roof_china.png',      w: 2400, h: 1012 },
  japan:      { lg: 'assets/roof_japan_lg.webp',      sm: 'assets/roof_japan.webp',      png: 'assets/roof_japan.png',      w: 2400, h: 747  },
  kazakhstan: { lg: 'assets/roof_kazakhstan_lg.webp', sm: 'assets/roof_kazakhstan.webp', png: 'assets/roof_kazakhstan.png', w: 2400, h: 1063 },
  uzbekistan: { lg: 'assets/roof_uzbekistan_lg.webp', sm: 'assets/roof_uzbekistan.webp', png: 'assets/roof_uzbekistan.png', w: 2400, h: 1024 },
  turkiye:    { lg: 'assets/roof_turkiye_lg.webp',    sm: 'assets/roof_turkiye.webp',    png: 'assets/roof_turkiye.png',    w: 2400, h: 980 }
};
const ROOF_DISP_W = { china: 700, japan: 720, kazakhstan: 660, uzbekistan: 680, turkiye: 680 };

const ROOFS = {};
for (const k0 of Object.keys(ROOF_ASSETS)) {
  const a0 = ROOF_ASSETS[k0];
  ROOFS[k0] = { canvas: null, w: ROOF_DISP_W[k0], h: ROOF_DISP_W[k0] * a0.h / a0.w, img: false };
}

function roofFallback(key) {   // procedural drawing
  const b = key === 'china' ? buildChinaRoof() :
            key === 'japan' ? buildJapanRoof() :
            key === 'kazakhstan' ? buildKazakhRoof() :
            key === 'uzbekistan' ? buildUzbekRoof() :
            buildTurkicRoof();
  ROOFS[key] = { canvas: b.canvas, w: b.w, h: b.h, img: false };
}

function loadImg(src) {
  return new Promise(res => {
    const im = new Image();           // created ONCE at preload — never per frame
    im.onload = () => res(im);
    im.onerror = () => res(null);
    im.src = src;
  });
}

/* preload ALL roof images before first paint (4s safety timeout) */
function preloadRoofs() {
  const small = window.innerWidth < 760;   // optimized 1200w WebP on mobile
  const jobs = Object.keys(ROOF_ASSETS).map(key => {
    const a = ROOF_ASSETS[key];
    return loadImg(small ? a.sm : a.lg)
      .then(im => im || loadImg(a.png))    // WebP decode failure -> PNG retry
      .then(im => {
        if (im) ROOFS[key] = { canvas: im, w: ROOF_DISP_W[key], h: ROOF_DISP_W[key] * a.h / a.w, img: true };
        else roofFallback(key);
      });
  });
  return Promise.race([Promise.all(jobs), new Promise(res => setTimeout(res, 4000))])
    .then(() => { for (const k of Object.keys(ROOF_ASSETS)) if (!ROOFS[k].canvas) roofFallback(k); });
}

/* ============================================================
   5. Text curtain — Verlet cloth of glyph sprites
   ============================================================ */
const CURTAIN_FONT_CJK = '"Songti SC","Noto Serif CJK SC","SimSun",Georgia,"Noto Serif",serif';
const CURTAIN_FONT_JP  = '"Hiragino Mincho ProN","Yu Mincho","Noto Serif CJK JP","Noto Serif CJK SC",Georgia,serif';
const CURTAIN_FONT_CY  = 'Georgia,"Times New Roman","Noto Serif",serif';

/* sprite atlas: one offscreen per unique char, rendered at the exact
   current display resolution -> per-frame drawImage is a 1:1 blit */
function buildSprites(pool, fontSize, fontStack) {
  const map = new Map();
  const cell = fontSize * 1.38;                 // design cell size
  const SS = Math.max(1, Math.min(2, dpr * scale));
  const S = Math.max(4, Math.ceil(cell * SS));
  for (const ch of pool) {
    if (map.has(ch)) continue;
    const cv = document.createElement('canvas');
    cv.width = S; cv.height = S;
    const c = cv.getContext('2d');
    c.font = '500 ' + (fontSize * SS) + 'px ' + fontStack;
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillStyle = '#3a2e24';
    c.fillText(ch, S / 2, S / 2 + fontSize * SS * 0.04);
    map.set(ch, { cv, cell });
  }
  return map;
}

/* lazily-built pre-rotated glyph variant (keeps per-frame draws as blits) */
function makeRotatedSprite(spr, angle) {
  const S2 = Math.ceil(spr.cv.width * 1.5);
  const cv = document.createElement('canvas');
  cv.width = S2; cv.height = S2;
  const c = cv.getContext('2d');
  c.translate(S2 / 2, S2 / 2);
  c.rotate(angle);
  c.drawImage(spr.cv, -spr.cv.width / 2, -spr.cv.height / 2);
  return { cv, cell: spr.cell * 1.5 };
}

class Curtain {
  /**
   * cfg: { cols, rows, cx, topY, cw, gap, rest, pool, fontSize,
   *        fontStack, seed, shadowScale }
   */
  constructor(cfg) {
    this.cols = cfg.cols;
    this.rows = cfg.rows;
    this.cx = cfg.cx;
    this.topY = cfg.topY;
    this.gap = cfg.gap;
    this.rest = cfg.rest;
    this.fontSize = cfg.fontSize;
    this.fontStack = cfg.fontStack;
    this.seed = cfg.seed;
    this.pool = cfg.pool;
    this.sprites = buildSprites(cfg.pool, cfg.fontSize, cfg.fontStack);
    this.pts = [];        // [col][row] -> {x,y,px,py}
    this.chars = [];      // [col][row] -> sprite
    this.alpha = [];      // [col][row] -> base alpha
    this.lenF = [];       // [col] -> length factor 0.86..1
    this.anchors = [];
    const rnd = mulberry32(cfg.seed);
    const x0 = cfg.cx - cfg.gap * (cfg.cols - 1) / 2;
    for (let col = 0; col < cfg.cols; col++) {
      const ax = x0 + col * cfg.gap;
      this.anchors.push({ x: ax, y: cfg.topY });
      this.lenF.push(0.82 + rnd() * 0.13);   // longest tails end ~y=1000
      const colPts = [], colCh = [], colAl = [];
      // each column reads the pool sequentially from a random offset
      let idx = Math.floor(rnd() * cfg.pool.length);
      for (let row = 0; row < cfg.rows; row++) {
        colPts.push({ x: ax, y: cfg.topY + row * cfg.rest, px: ax, py: cfg.topY + row * cfg.rest });
        colCh.push(cfg.pool[idx]);
        colAl.push(0.72 + rnd() * 0.23);
        idx = (idx + 1) % cfg.pool.length;
      }
      this.pts.push(colPts);
      this.chars.push(colCh);
      this.alpha.push(colAl);
    }
    // constant per-glyph bottom fade, precomputed once
    this.fade = [];
    for (let col = 0; col < cfg.cols; col++) {
      const f = this.lenF[col], colF = [];
      for (let row = 0; row < cfg.rows; row++) {
        const t = row / (cfg.rows - 1);
        const start = 0.62 * f;
        colF.push(t <= start ? 1 : 1 - smoothstep(start, f, t));
      }
      this.fade.push(colF);
    }
    this.enterT = 0;
    this.dirty = true;     // shadow needs rebuild
    this._bbox = null;
    this.rotCache = new Map();
  }

  setCustomText(text) {
    if (!text || !text.trim()) return;
    const clean = Array.from(text.trim());
    this.pool = text;
    this.sprites = buildSprites(text, this.fontSize, this.fontStack);
    let idx = 0;
    for (let c = 0; c < this.cols; c++) {
      for (let r = 0; r < this.rows; r++) {
        this.chars[c][r] = clean[idx % clean.length];
        idx++;
      }
    }
  }

  burst(cx, cy, force = 40) {
    for (let c = 0; c < this.cols; c++) {
      for (let r = 1; r < this.rows; r++) {
        const p = this.pts[c][r];
        const dx = p.x - cx;
        const dy = p.y - cy;
        const dist = Math.hypot(dx, dy) || 1;
        if (dist < 320) {
          const push = (1 - dist / 320) * force;
          const angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.4;
          p.px = p.x - Math.cos(angle) * push;
          p.py = p.y - Math.sin(angle) * push;
        }
      }
    }
  }

  reset() {
    for (let col = 0; col < this.cols; col++) {
      const ax = this.anchors[col].x, ay = this.anchors[col].y;
      for (let row = 0; row < this.rows; row++) {
        const p = this.pts[col][row];
        p.x = p.px = ax;
        p.y = p.py = ay + row * this.rest;
      }
    }
    this.enterT = 0;
    this.dirty = true;
  }

  rebuildSprites() {
    this.sprites = buildSprites(this.pool, this.fontSize, this.fontStack);
    this.rotCache.clear();
  }

  /* actor: {x,y,vx,vy} design-space pointer; force only while moving */
  simulate(dt, actor, allowForce, breezeOn) {
    this.enterT += dt;
    const damp = 0.982, g = 1500;
    const dt2 = dt * dt;
    const dt60 = dt * 60;
    const R = 175;
    const sp = actor ? Math.hypot(actor.vx, actor.vy) : 0;
    const forcing = allowForce && actor && sp > 30;
    let nvx = 0, nvy = 0, spC = 0;
    if (forcing) {
      spC = Math.min(sp, 2400);
      nvx = actor.vx / sp; nvy = actor.vy / sp;
    }
    let maxMove = 0;

    for (let col = 0; col < this.cols; col++) {
      const colPts = this.pts[col];
      for (let row = 1; row < this.rows; row++) {   // row 0 is pinned
        const p = colPts[row];
        const ox0 = p.x, oy0 = p.y;
        // 1. Verlet integrate
        let vx = (p.x - p.px) * damp;
        let vy = (p.y - p.py) * damp;
        p.px = p.x; p.py = p.y;
        p.x += vx;
        p.y += vy + g * dt2;
        const mv = Math.abs(p.x - ox0) + Math.abs(p.y - oy0);
        if (mv > maxMove) maxMove = mv;
      }
    }

    // 3. constraint iterations x4
    for (let it = 0; it < 4; it++) {
      // (a) strong vertical links
      for (let col = 0; col < this.cols; col++) {
        const colPts = this.pts[col];
        const a = this.anchors[col];
        colPts[0].x = a.x; colPts[0].y = a.y;      // pin
        for (let row = 1; row < this.rows; row++) {
          const p0 = colPts[row - 1], p1 = colPts[row];
          let dx = p1.x - p0.x, dy = p1.y - p0.y;
          let d = Math.sqrt(dx * dx + dy * dy) || 1e-4;
          const diff = (d - this.rest) / d;
          if (row === 1) {                          // anchored link: move p1 only
            p1.x -= dx * diff;
            p1.y -= dy * diff;
          } else {
            const hx = dx * diff * 0.5, hy = dy * diff * 0.5;
            p0.x += hx; p0.y += hy;
            p1.x -= hx; p1.y -= hy;
          }
        }
      }
      // (b) weak horizontal shear springs -> fabric coherence
      const k = 0.028;
      for (let row = 1; row < this.rows; row++) {
        for (let col = 0; col < this.cols - 1; col++) {
          const p0 = this.pts[col][row], p1 = this.pts[col + 1][row];
          const dx = p1.x - p0.x;
          const diff = (dx - this.gap) * k * 0.5;
          p0.x += diff;
          p1.x -= diff;
        }
      }
      // (c) pins
      for (let col = 0; col < this.cols; col++) {
        this.pts[col][0].x = this.anchors[col].x;
        this.pts[col][0].y = this.anchors[col].y;
      }
    }

    // 2b. pointer force (only while pointer moves) — applied after the
    // constraint pass so a fast stroke visibly carries the fabric;
    // part of the impulse is deposited as momentum for the swing-back
    if (forcing) {
      for (let col = 0; col < this.cols; col++) {
        const colPts = this.pts[col];
        for (let row = 1; row < this.rows; row++) {
          const p = colPts[row];
          const dx = p.x - actor.x, dy = p.y - actor.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < R * R) {
            const d = Math.sqrt(d2) || 1;
            const fall = (1 - d / R) * (1 - d / R);
            let dirx = dx / d * 0.45 + nvx * 0.9;
            let diry = dy / d * 0.45 + nvy * 0.9;
            const dl = Math.hypot(dirx, diry) || 1;
            const imp = Math.min(fall * spC * 0.006 * dt60, 11);
            const ix = dirx / dl * imp, iy = diry / dl * imp;
            p.x += ix; p.y += iy;
            p.px -= ix * 0.35; p.py -= iy * 0.35;   // momentum share
            // perpendicular bias: strands part to BOTH sides of the stroke
            const cross = actor.vx * dy - actor.vy * dx;
            const sgn = cross >= 0 ? 1 : -1;
            const perp = fall * spC * 0.013 * dt60;
            p.x += (-nvy) * sgn * perp;
            p.y += (nvx) * sgn * perp;
          }
        }
      }
      maxMove = Math.max(maxMove, 10);
    }

    // 4. barely-perceptible idle breeze (never in first 2s)
    if (breezeOn && this.enterT > 2) {
      const t = this.enterT;
      for (let col = 0; col < this.cols; col++) {
        for (let row = 2; row < this.rows; row++) {
          const p = this.pts[col][row];
          p.x += Math.sin(t * 0.7 + row * 0.15 + col * 0.3) * 0.05 * (row / this.rows);
        }
      }
    }

    // 5. velocity clamp
    const vmax = 1100, vmaxDt = vmax * dt;
    for (let col = 0; col < this.cols; col++) {
      for (let row = 1; row < this.rows; row++) {
        const p = this.pts[col][row];
        let vx = p.x - p.px, vy = p.y - p.py;
        const v = Math.hypot(vx, vy);
        if (v > vmaxDt) {
          const s = vmaxDt / v;
          p.px = p.x - vx * s;
          p.py = p.y - vy * s;
        }
      }
    }

    if (maxMove > 0.4) this.dirty = true;
    return maxMove;
  }

  bottomFade(col, row) {
    return this.fade[col][row];
  }

  bbox() {
    if (this._bbox) return this._bbox;
    let x0 = 1e9, x1 = -1e9, y1 = -1e9;
    for (let col = 0; col < this.cols; col++) {
      const a = this.anchors[col];
      if (a.x < x0) x0 = a.x;
      if (a.x > x1) x1 = a.x;
    }
    y1 = this.topY + this.rows * this.rest;
    this._bbox = { x0, x1, y0: this.topY, y1 };
    return this._bbox;
  }

  /* draw glyphs; sceneTX/sceneTY slide whole scene, opacity fades it */
  draw(c, sceneTX, sceneTY, opacity) {
    const a0 = dpr * scale;               // root uniform scale
    const oxD = dpr * ox, oyD = dpr * oy;
    c.setTransform(1, 0, 0, 1, 0, 0);
    let identity = true;
    for (let col = 0; col < this.cols; col++) {
      const colPts = this.pts[col], colCh = this.chars[col], colAl = this.alpha[col];
      for (let row = 0; row < this.rows; row++) {
        const fade = this.bottomFade(col, row);
        if (fade <= 0.01) continue;
        const p = colPts[row];
        const spr = this.sprites.get(colCh[row]);
        const cell = spr.cell;
        const devX = oxD + (p.x + sceneTX) * a0;
        const devY = oyD + (p.y + sceneTY) * a0;
        c.globalAlpha = colAl[row] * fade * opacity;
        // rotation from vertical-neighbor tangent
        const up = row === 0 ? p : colPts[row - 1];
        const dn = row === this.rows - 1 ? p : colPts[row + 1];
        const th = Math.atan2(dn.y - up.y, dn.x - up.x) - Math.PI / 2;
        // quantized angle buckets: 0 -> upright blit; else pre-rotated
        // sprite variant (lazy cache) -> still a fast axis-aligned blit
        const bucket = th > 0 ? Math.min(5, (th / 0.16 + 0.5) | 0)
                            : Math.max(-5, (th / 0.16 - 0.5) | 0);
        if (bucket === 0) {
          const dc = cell * a0;
          c.drawImage(spr.cv, devX - dc / 2, devY - dc / 2, dc, dc);
        } else {
          let variants = this.rotCache.get(colCh[row]);
          if (!variants) {
            variants = new Array(15);
            this.rotCache.set(colCh[row], variants);
            if (this.rotCache.size > 500) this.rotCache.clear();
          }
          let v = variants[bucket + 7];
          if (!v) {
            v = makeRotatedSprite(spr, bucket * 0.16);
            variants[bucket + 7] = v;
          }
          const dc = v.cell * a0;
          c.drawImage(v.cv, devX - dc / 2, devY - dc / 2, dc, dc);
        }
      }
    }
    c.globalAlpha = 1;
  }

  /* silhouette dots for the cast shadow (silCtx pre-scaled to design) */
  drawSilhouette(sc, sceneTX, sceneTY) {
    sc.fillStyle = '#5a4632';
    for (let col = 0; col < this.cols; col++) {
      const colPts = this.pts[col];
      for (let row = 0; row < this.rows; row++) {
        if (this.bottomFade(col, row) <= 0.12) continue;
        const p = colPts[row];
        sc.globalAlpha = 0.42 * this.alpha[col][row] * fadeSil(p.y + sceneTY);
        sc.fillRect(p.x + sceneTX - 1.6, p.y + sceneTY - 1.6, 3.2, 3.2);
      }
    }
    sc.globalAlpha = 1;
  }
}

/* ============================================================
   6. Shadows — subtle dynamic curtain shadow + short roof
   contact shadow. Warm gray-brown, ~8-14% opacity total.
   (The old large building-shaped cast shadow was removed.)
   ============================================================ */
const SIL_S = 0.32;       // silhouette buffer scale (upsampling = free softness)
const SH_DX = 16, SH_DY = 26;   // small down-right offset (light from upper-left)

function createShadowBuffer() {
  const cv = document.createElement('canvas');
  cv.width = Math.round(W * SIL_S);
  cv.height = Math.round(H * SIL_S);
  return { cv, dirty: true, tx: null, ty: null };
}

/* legacy helper kept for the (now unused) Curtain.drawSilhouette method —
   the long building cast shadow was removed in the visual refresh */
function fadeSil(y) { return 0.6; }

/* warm gray-brown dots for the curtain silhouette (read-only on curtain) */
function drawCurtainSil(sc, curtain, tx, ty) {
  sc.fillStyle = '#5a4632';
  for (let col = 0; col < curtain.cols; col++) {
    const colPts = curtain.pts[col], colAl = curtain.alpha[col];
    for (let row = 0; row < curtain.rows; row++) {
      const f = curtain.bottomFade(col, row);
      if (f <= 0.12) continue;
      const p = colPts[row];
      sc.globalAlpha = 0.5 * colAl[row] * f;
      sc.fillRect(p.x + tx - 2.1, p.y + ty - 2.1, 4.2, 4.2);
    }
  }
  sc.globalAlpha = 1;
}

/* rebuild the silhouette buffer (curtain dots only — no building shape) */
function rebuildShadow(sh, curtain, tx, ty) {
  const sc = sh.cv.getContext('2d');
  sc.setTransform(1, 0, 0, 1, 0, 0);
  sc.clearRect(0, 0, sh.cv.width, sh.cv.height);
  sc.setTransform(SIL_S, 0, 0, SIL_S, 0, 0);
  if (curtain) drawCurtainSil(sc, curtain, tx, ty);
  sh.dirty = false;
  sh.tx = tx; sh.ty = ty;
}

/* phase 1: keep the silhouette buffer fresh (rebuild capped to every 3rd frame) */
function updateShadowSil(sh, curtain, tx, ty) {
  const moved = sh.tx !== tx || sh.ty !== ty;
  if (sh.dirty || moved) {
    sh.skipN = ((sh.skipN || 0) + 1) % 3;
    if (moved || sh.skipN === 0) {
      rebuildShadow(sh, curtain, tx, ty);
      return true;
    }
  }
  return false;
}

/* phase 2: multiply-blit the silhouette into `target` (design-root transform) */
function blitShadow(target, sh, opacity) {
  target.save();
  target.globalCompositeOperation = 'multiply';
  target.globalAlpha = 0.30 * opacity;   // ~8-14% effective darkening per dot
  target.imageSmoothingEnabled = true;
  target.drawImage(sh.cv, 0, 0, sh.cv.width, sh.cv.height, SH_DX, SH_DY, W, H);
  target.restore();
}

function drawCurtainShadow(sh, curtain, tx, ty, opacity) {
  updateShadowSil(sh, curtain, tx, ty);
  blitShadow(ctx, sh, opacity);
}

/* steady-state hero: paper + curtain shadow composited once, blitted per frame */
let sceneBgCanvas = null, sceneBgKey = null;
function compositeSceneBg(key) {
  if (!bgCanvas || !curShadow) return;
  if (!sceneBgCanvas) sceneBgCanvas = document.createElement('canvas');
  if (sceneBgCanvas.width !== bgCanvas.width || sceneBgCanvas.height !== bgCanvas.height) {
    sceneBgCanvas.width = bgCanvas.width;
    sceneBgCanvas.height = bgCanvas.height;
  }
  const c = sceneBgCanvas.getContext('2d');
  c.setTransform(1, 0, 0, 1, 0, 0);
  c.drawImage(bgCanvas, 0, 0);
  c.setTransform(dpr * scale, 0, 0, dpr * scale, ox * dpr, oy * dpr);
  blitShadow(c, curShadow, 1);
  sceneBgKey = key;
}

/* short soft contact shadow directly beneath the roof */
let contactCanvas = null;
function drawContactShadow(cx, cy, rx, ry, opacity) {
  if (!contactCanvas) {
    contactCanvas = document.createElement('canvas');
    contactCanvas.width = 256; contactCanvas.height = 64;
    const c = contactCanvas.getContext('2d');
    c.translate(128, 32);
    c.scale(128, 32);
    const g = c.createRadialGradient(0, 0, 0, 0, 0, 1);
    g.addColorStop(0, 'rgba(90,70,50,0.20)');
    g.addColorStop(0.65, 'rgba(90,70,50,0.09)');
    g.addColorStop(1, 'rgba(90,70,50,0)');
    c.fillStyle = g;
    c.fillRect(-1, -1, 2, 2);
  }
  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.drawImage(contactCanvas, cx - rx, cy - ry, rx * 2, ry * 2);
  ctx.restore();
}

/* Fit the roof source into the scene's target box, anchored bottom-center,
   so the curtain (topY) always meets the roof's lowest structural band. */
function roofEntry(key) {
  const s = SCENES[key], r = ROOFS[key];
  const f = Math.min(s.roofBox.w / r.w, s.roofBox.h / r.h);
  const w = r.w * f, h = r.h * f;
  return { canvas: r.canvas, w, h, px: CX - w / 2, py: s.roofBox.top + s.roofBox.h - h };
}
function makeCurtain(key) {

    cols: s.cols, rows: s.rows, cx: CX, topY: s.topY,
    gap: s.gap, rest: s.rest, pool: s.pool,

/* card <img> crops reuse the same generated assets (1200w WebP is ample) */
function cardSrc(key) { return ROOF_ASSETS[key].sm; }

/* Production-safe card imagery: try sm webp → lg webp → png, then degrade to a
   neutral monogram plate. Broken-image icons / alt text are never exposed —
   the <img> is hidden (visibility keeps layout) and the frame shows the plate. */
function armImgFallback(img, key) {
  const a = ROOF_ASSETS[key];
  const chain = [a.sm, a.lg, a.png];
  let i = 0;
  img.classList.remove('imgdead');
  const frame = img.closest('.cframe');
  if (frame) frame.classList.remove('noimg');
  img.onerror = () => {
    i += 1;
    if (i < chain.length) {
      img.src = chain[i];
    } else {
      img.onerror = null;
      img.classList.add('imgdead');
      if (frame) {
        frame.classList.add('noimg');
        frame.setAttribute('data-mono', SCENES[key].num + ' · ' + SCENES[key].name);
      }
    }
  };
  img.src = chain[0];
}

function fillCard(imgEl, numEl, capEl, subEl, key) {

/* ============================================================
   8. Scene manager — directional switching, gallery, routing
   ============================================================ */
/* built in boot() after roof images finish preloading */
let ROOF_ENTRIES = null;

/* roof image pre-scaled to current display size -> fast device-space blit */
const roofDispCache = new Map();
function roofDisplay(key) {
  const ck = key + '@' + dpr + 'x' + scale.toFixed(4);
  let e = roofDispCache.get(ck);
  if (!e) {
    const re = ROOF_ENTRIES[key];
    const w = Math.max(2, Math.round(re.w * scale * dpr));
    const h = Math.max(2, Math.round(re.h * scale * dpr));
    const cv = document.createElement('canvas');
    cv.width = w; cv.height = h;
    const c2 = cv.getContext('2d');
    c2.imageSmoothingEnabled = true;
    c2.imageSmoothingQuality = 'high';
    c2.drawImage(re.canvas, 0, 0, w, h);
    e = { canvas: cv, px: re.px, py: re.py };
    if (roofDispCache.size > 12) roofDispCache.clear();
    roofDispCache.set(ck, e);
  }
  return e;
}

let mode = 'hero';              // 'hero' | 'gallery'
let curKey = 'china';
let lastHeroKey = 'china';
let curCurtain = null;
let curShadow = null;
let trans = null;               // active hero->hero transition
let gallery = null;             // gallery state
let introT = -1;                // initial fade-in timer
let inputLocked = false;

function dirFor(key) {
  return ORDER.indexOf(key) >= ORDER.indexOf(curKey) ? 1 : -1;
}

/* ---------- hero rendering ---------- */
function renderHeroScene(key, curtain, shadow, tx, ty, opacity, skipShadow) {
  if (!curtain || opacity <= 0) return;
  const s = SCENES[key];
  let t0 = performance.now();
  if (!skipShadow) {
    drawCurtainShadow(shadow, curtain, tx, ty, opacity);
  }
  prof('shadow', t0);
  t0 = performance.now();
  curtain.draw(ctx, tx, ty, opacity);
  prof('curtain', t0);
  // roof: display-cached device-space blit
  const rd = roofDisplay(key);
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.globalAlpha = opacity;
  ctx.drawImage(rd.canvas, dpr * (ox + (rd.px + tx) * scale), dpr * (oy + (rd.py + ty) * scale));
  ctx.globalAlpha = 1;
  ctx.setTransform(dpr * scale, 0, 0, dpr * scale, ox * dpr, oy * dpr);
  drawContactShadow(CX + s.contact.dx + tx, s.topY + s.contact.dy + ty,
    s.contact.rx, s.contact.ry, opacity);
}

/* ---------- hero -> hero transition (SPEC §9) ---------- */
function startTransition(toKey, dir) {
  if (trans || toKey === curKey || mode !== 'hero') return;
  inputLocked = true;
  domFadeOut();
  setHash('#' + toKey);
  trans = {
    dir, toKey, t: 0, swapped: false,
    fromKey: curKey, fromCurtain: curCurtain, fromShadow: curShadow
  };
}

function updateTransition(dt) {
  if (!trans) return;
  trans.t += dt;
  const T = trans;
  // Phase C start: swap content while invisible
  if (T.t >= 0.78 && !T.swapped) {
    T.swapped = true;
    curKey = T.toKey;
    lastHeroKey = curKey;
    applyCopy(curKey);
    curCurtain = makeCurtain(curKey);      // starts perfectly vertical, at rest
    curShadow = createShadowBuffer();
    setHintText('DRAG THROUGH THE CURTAIN');  // restore after gallery
    domFadeIn(true);                        // staggered text fade-in
  }
  if (T.t >= 1.5) {
    T.fromCurtain = null;                   // drop exiting scene
    T.fromShadow = null;
    trans = null;
    inputLocked = false;
  }
}

function renderTransition() {
  const T = trans;
  const EXIT_X = W * 0.6;
  if (T.t < 0.38) {
    // Phase A: current building slides off toward -dir
    const u = easeInQuad(T.t / 0.38);   // easeIn that still reads as "mid-slide" by 150ms
    renderHeroScene(T.fromKey, T.fromCurtain, T.fromShadow,
      -T.dir * u * EXIT_X, 0, 1 - 0.8 * u);
  } else if (T.t < 0.78) {
    // Phase B: paper-only empty beat — draw nothing
  } else {
    // Phase C: new scene enters from +dir with slight overshoot
    const u = clamp((T.t - 0.78) / 0.72, 0, 1);
    const x = T.dir * EXIT_X * (1 - easeOutBack(u, 1.15));
    const op = clamp(u * 3, 0, 1);
    renderHeroScene(curKey, curCurtain, curShadow, x, 0, op);
  }
}

/* ---------- gallery ---------- */
/* door centers: wide desktop spacing; compressed on mobile so all three
   doorways fit the handset viewport (screen centers at 1/6, 1/2, 5/6) */
function doorCenter(i) {
  if (document.body.classList.contains('mobile')) {
    return (([0.167, 0.5, 0.833][i] * vw) - ox) / scale;
  }
  return DOOR_CENTERS[i];
}

function makeMini(key, i) {
  const s = SCENES[key], m = 0.42;
  const cx = doorCenter(i);
  const topY = 300 + (s.topY - s.roofBox.top) * m;
  const curtain = new Curtain({
    cols: 14, rows: 22, cx, topY,
    gap: s.gap * m * (s.cols - 1) / 13, rest: s.rest * m,
    pool: s.pool, fontSize: s.fontSize * m + 0.6,
    fontStack: s.fontStack, seed: s.seed + 7
  });
  return { key, cx, curtain, shadow: createShadowBuffer() };
}

/* mini (gallery-scale) roof, pre-scaled to display size */
const roofMiniCache = new Map();
function roofMini(key) {
  const ck = key + '@m' + dpr + 'x' + scale.toFixed(4);
  let e = roofMiniCache.get(ck);
  if (!e) {
    const re0 = ROOF_ENTRIES[key], m = 0.42;
    const w = Math.max(2, Math.round(re0.w * m * scale * dpr));
    const h = Math.max(2, Math.round(re0.h * m * scale * dpr));
    const cv = document.createElement('canvas');
    cv.width = w; cv.height = h;
    const c2 = cv.getContext('2d');
    c2.imageSmoothingEnabled = true;
    c2.imageSmoothingQuality = 'high';
    c2.drawImage(re0.canvas, 0, 0, w, h);
    e = { canvas: cv, w: re0.w * m, h: re0.h * m };
    if (roofMiniCache.size > 12) roofMiniCache.clear();
    roofMiniCache.set(ck, e);
  }
  return e;
}

function enterGallery(instant) {
  if (mode === 'gallery' || trans) return;
  lastHeroKey = curKey;
  inputLocked = true;
  domFadeOut();
  setHash('#gallery');
  setNavActive('dest');
  gallery = {
    t: 0, state: 'in',
    items: ORDER.map((key, i) => makeMini(key, i))
  };
  if (instant) gallery.t = 10;
}

function leaveGalleryTo(key) {
  if (mode !== 'gallery' || !gallery || gallery.state !== 'in') return;
  inputLocked = true;
  showDoors(false);
  elHint.classList.add('faded');
  const dir = ORDER.indexOf(key) >= ORDER.indexOf(lastHeroKey) ? 1 : -1;
  gallery.state = 'out';
  gallery.t = 0;
  _gTarget = key;
  _gDir = dir;
  setHash('#' + key);
}

function updateGallery(dt) {
  if (!gallery) return;
  gallery.t += dt;
  if (gallery.state === 'in') {
    if (gallery.t >= 0.4 && mode !== 'gallery') {
      mode = 'gallery';
      setHintText('CLICK A DOORWAY TO ENTER');
      elHint.classList.remove('faded');
      showDoors(true);
      inputLocked = false;
    }
    const breeze = true;
    for (const it of gallery.items) it.curtain.simulate(dt, actor, mode === 'gallery' && !inputLocked, breeze && !REDUCED);
  } else { // 'out'
    if (gallery.t >= 0.35) {
      mode = 'hero';
      gallery = null;
      showDoors(false);
      // hero enters with a phase-C style slide
      const key = galleryTarget();
      trans = { dir: galleryDir(), toKey: key, t: 0.78, swapped: false, fromKey: null, fromCurtain: null, fromShadow: null };
    }
  }
}
let _gTarget = 'china', _gDir = 1;
function galleryTarget() { return _gTarget; }
function galleryDir() { return _gDir; }

function renderGallery(dt) {
  const g = gallery;
  // hero fading away during entry
  if (g.state === 'in' && g.t < 0.45 && mode !== 'gallery') {
    const u = clamp(g.t / 0.4, 0, 1);
    renderHeroScene(curKey, curCurtain, curShadow, 0, 0, 1 - u);
  }
  const leaving = g.state === 'out';
  for (let i = 0; i < g.items.length; i++) {
    const it = g.items[i];
    let u;
    if (leaving) u = 1 - clamp(g.t / 0.3, 0, 1);
    else u = clamp((g.t - 0.4 - i * 0.09) / 0.4, 0, 1);
    if (u <= 0) continue;
    const dy = 30 * (1 - u);
    const s = SCENES[it.key], m = 0.42;
    const rm = roofMini(it.key);
    drawCurtainShadow(it.shadow, it.curtain, 0, dy, u);
    it.curtain.draw(ctx, 0, dy, u);
    // mini roof: display-cached device-space blit (over the curtain top)
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.globalAlpha = u;
    ctx.drawImage(rm.canvas, dpr * (ox + (it.cx - rm.w / 2) * scale), dpr * (oy + (300 + dy) * scale));
    ctx.globalAlpha = 1;
    ctx.setTransform(dpr * scale, 0, 0, dpr * scale, ox * dpr, oy * dpr);
    drawContactShadow(it.cx + s.contact.dx * m, it.curtain.topY + dy + s.contact.dy * m,
      s.contact.rx * m, s.contact.ry * m, u);
  }
}

/* ---------- routing ---------- */
let suppressHash = false;
function setHash(h) {
  if (location.hash === h) return;
  suppressHash = true;
  location.hash = h;
  setTimeout(() => { suppressHash = false; }, 60);
}
window.addEventListener('hashchange', () => {
  if (suppressHash) return;
  route(location.hash);
});
function route(h) {
  h = (h || '').replace('#', '');
  if (h === 'gallery') {
    if (mode === 'hero' && !trans) enterGallery();
  } else if (SCENES[h]) {
    if (mode === 'gallery') { leaveGalleryTo(h); }
    else if (h !== curKey && !trans) startTransition(h, dirFor(h));
  }
}

/* ---------- chrome events ---------- */
function setNavActive(which) {
  elNavHome.classList.toggle('active', which === 'home');
  elNavDest.classList.toggle('active', which === 'dest');
}
function keyActivate(el) {   // Enter / Space trigger for keyboard users
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
  });
}
[elCardL, elCardR, elNavHome, elNavDest, document.getElementById('configure')].forEach(keyActivate);
elCardL.addEventListener('click', () => { onUserGesture(); startTransition(elCardL.dataset.target, -1); });
elCardR.addEventListener('click', () => { onUserGesture(); startTransition(elCardR.dataset.target, +1); });
document.getElementById('navHome').addEventListener('click', () => {
  onUserGesture();
  if (mode === 'gallery') leaveGalleryTo(lastHeroKey);
  else if (curKey !== 'china') startTransition('china', dirFor('china'));
});
document.getElementById('navDest').addEventListener('click', () => {
  onUserGesture();
  if (mode === 'hero') enterGallery();
});
window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && mode === 'gallery') leaveGalleryTo(lastHeroKey);
});

/* ---------- boot ---------- */
function boot() {
  ROOF_ENTRIES = {};
  ORDER.forEach(k => ROOF_ENTRIES[k] = roofEntry(k));
  resize();
  const h = (location.hash || '').replace('#', '');
  if (h === 'gallery') {
    curKey = 'china'; lastHeroKey = 'china';
    curCurtain = makeCurtain('china');
    curShadow = createShadowBuffer();
    applyCopy('china');
    enterGallery(true);
    mode = 'gallery';
    showDoors(true);
    setHintText('CLICK A DOORWAY TO ENTER');
    gallery.t = 10;
    inputLocked = false;
  } else {
    curKey = SCENES[h] ? h : 'china';
    lastHeroKey = curKey;
    applyCopy(curKey);
    curCurtain = makeCurtain(curKey);
    curShadow = createShadowBuffer();
    introT = 0;
    FADEABLE.forEach(el => el.classList.add('faded'));
    setTimeout(() => domFadeIn(false), 80);
  }
}

/* Export Editorial Poster */
function exportPoster() {
  closeModal();
  const pCv = document.createElement('canvas');
  pCv.width = W; pCv.height = H;
  const pCtx = pCv.getContext('2d');

  if (bgCanvas) {
    pCtx.drawImage(bgCanvas, 0, 0, bgCanvas.width, bgCanvas.height, 0, 0, W, H);
  } else {
    pCtx.fillStyle = nightMode ? '#141722' : '#E8DECB';
    pCtx.fillRect(0, 0, W, H);
  }

  if (curCurtain) {
    if (curShadow) drawCurtainShadow(curShadow, curCurtain, 0, 0, 1);
    curCurtain.draw(pCtx, 0, 0, 1);
    const rd = roofDisplay(curKey);
    if (rd) {
      const re = ROOF_ENTRIES[curKey];
      pCtx.drawImage(re.canvas, re.px, re.py, re.w, re.h);
    }
  }

  particles.forEach(p => p.draw(pCtx, nightMode));

  const s = SCENES[curKey];
  pCtx.fillStyle = nightMode ? '#E6A845' : '#A64A2A';
  pCtx.font = '12px ui-monospace, monospace';
  pCtx.fillText('WHISPERING EAVES · ' + s.num + ' ' + s.name, 100, 70);

  pCtx.fillStyle = nightMode ? '#C5B8A5' : '#65543D';
  pCtx.fillText(s.kicker, 100, 500);

  pCtx.fillStyle = nightMode ? '#FFFFFF' : '#211A15';
  pCtx.font = '500 56px Didot, Didone, Georgia, serif';
  let yPos = 550;
  s.title.forEach(line => {
    pCtx.fillText(line, 100, yPos);
    yPos += 58;
  });

  const link = document.createElement('a');
  link.download = 'whispering_eaves_' + curKey + '_poster.png';
  link.href = pCv.toDataURL('image/png');
  link.click();
}

});

/* Weather selector buttons */
document.querySelectorAll('.weather-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.weather-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    weatherMode = btn.dataset.weather;
    particles.forEach(p => p.reset(true));
  });
});

/* ============================================================
   9. Input, custom cursor, auto-demo ghost, main loop
   ============================================================ */
const pointer = { x: CX, y: H * 0.55, seen: false, overUI: false, type: 'mouse' };
const actor = { x: CX, y: H * 0.55, vx: 0, vy: 0 };
let ghostKilled = false;
let lastInteract = -100;
const ghost = { active: false, t: 0, nextAt: 9 };
let nowSec = 0;

function onUserGesture() {
  ghostKilled = true;
  ghost.active = false;
  lastInteract = nowSec;
}

window.addEventListener('pointermove', e => {
  const d = toDesign(e.clientX, e.clientY);
  pointer.x = d.x; pointer.y = d.y;
  pointer.seen = true;
  pointer.type = e.pointerType === 'touch' ? 'touch' : 'mouse';
  pointer.overUI = (e.target !== stage);
  onUserGesture();
}, { passive: true });
window.addEventListener('pointerdown', e => {
  const d = toDesign(e.clientX, e.clientY);
  pointer.x = d.x; pointer.y = d.y;
  pointer.seen = true;
  pointer.type = e.pointerType === 'touch' ? 'touch' : 'mouse';
  pointer.overUI = (e.target !== stage);
  onUserGesture();
}, { passive: true });
window.addEventListener('pointerup', () => { /* curtain swings back naturally */ }, { passive: true });

/* actor = real pointer OR ghost driver, with smoothed velocity */
function updateActor(dt) {
  let tx = pointer.x, ty = pointer.y, driven = false;
  if (ghost.active) {
    ghost.t += dt;
    const dur = 1.7, u = ghost.t / dur;
    if (u >= 1) {
      ghost.active = false;
      ghost.nextAt = nowSec + 7;
    } else {
      const e = u < 0.5 ? 2 * u * u : 1 - Math.pow(-2 * u + 2, 2) / 2;
      const s = SCENES[curKey];
      tx = CX - 300 + 600 * e;
      ty = s.topY + 240 + Math.sin(u * Math.PI) * 80;
      driven = true;
    }
  }
  const dts = Math.max(dt, 1e-3);
  let ivx = (tx - actor.x) / dts, ivy = (ty - actor.y) / dts;
  if (!isFinite(ivx) || !isFinite(ivy)) { ivx = 0; ivy = 0; }
  const blend = driven ? 0.5 : 0.45;
  actor.vx = lerp(actor.vx, ivx, blend);
  actor.vy = lerp(actor.vy, ivy, blend);
  if (!isFinite(actor.vx) || !isFinite(actor.vy)) { actor.vx = 0; actor.vy = 0; }
  if (Math.hypot(actor.vx, actor.vy) < 12) { actor.vx = 0; actor.vy = 0; }
  actor.x = tx; actor.y = ty;
}
function maybeStartGhost() {
  if (ghostKilled || REDUCED || ghost.active) return;
  if (mode !== 'hero' || trans || inputLocked) return;
  if (nowSec - lastInteract > 9 && nowSec >= ghost.nextAt) {
    ghost.active = true;
    ghost.t = 0;
  }
}

/* ---------- custom cursor (canvas-drawn, restrained) ---------- */
let cursorR = 14;
function drawCursor() {
  if (pointer.type !== 'mouse' || !pointer.seen || pointer.overUI) return;
  if (ghost.active) return;
  const sx = ox + pointer.x * scale, sy = oy + pointer.y * scale;
  if (sx < 0 || sy < 0 || sx > vw || sy > vh) return;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  let over = false;
  if (mode === 'hero' && curCurtain && !trans) {
    const b = curCurtain.bbox();
    over = pointer.x > b.x0 - 40 && pointer.x < b.x1 + 40 &&
           pointer.y > b.y0 - 40 && pointer.y < b.y1 + 40;
  } else if (gallery) {
    over = true;
  }
  cursorR = lerp(cursorR, over ? 22 : 14, 0.18);
  if (over) {
    ctx.fillStyle = nightMode ? 'rgba(230,168,69,0.12)' : 'rgba(160,120,80,0.08)';
    ctx.beginPath(); ctx.arc(sx, sy, 30, 0, TAU); ctx.fill();
  }
  ctx.strokeStyle = nightMode ? 'rgba(232,223,208,0.5)' : 'rgba(58,44,32,0.4)';
  ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(sx, sy, cursorR, 0, TAU); ctx.stroke();
  ctx.fillStyle = nightMode ? '#E8DFD0' : '#3a2c20';
  ctx.beginPath(); ctx.arc(sx, sy, 3, 0, TAU); ctx.fill();
}

/* ---------- update / render ---------- */
function update(dt) {
  maybeStartGhost();
  updateActor(dt);

  // ambient wind & particle updates
  const wind = Math.sin(nowSec * 0.8) * Math.cos(nowSec * 0.4) * 0.8;
  particles.forEach(p => p.update(dt, wind));

  if (actor.active && actor.v > 35 && curCurtain && mode === 'hero') {
    audio.playChime(actor.x / W, actor.v / 120);
  }

  if (gallery) {
    updateGallery(dt);
    return;
  }
  if (mode === 'hero') {
    if (trans) {
      updateTransition(dt);
      if (trans && trans.swapped && curCurtain) {
        curCurtain.simulate(dt, actor, false, false);  // settle, no force
      }
    } else if (curCurtain) {
      curCurtain.simulate(dt, actor, !inputLocked, !REDUCED);
    }
    if (introT >= 0 && introT < 1) {
      introT = Math.min(1, introT + dt / 0.7);
      if (introT >= 1) introT = -1;
    }
  }
}

const PROF = { on: false, acc: {}, n: 0 };
window.__PROF = PROF;
function prof(name, t0) { if (PROF.on) { PROF.acc[name] = (PROF.acc[name] || 0) + (performance.now() - t0); } }

function render(dt) {
  let t0 = performance.now();
  // steady hero scene: paper + shadow precomposited -> single blit
  const steadyHero = mode === 'hero' && !gallery && !trans && introT < 0 &&
                     sceneBgKey === curKey && sceneBgCanvas && !nightMode;
  if (steadyHero && updateShadowSil(curShadow, curCurtain, 0, 0)) {
    compositeSceneBg(curKey);
  }
  prof('shadow', t0);

  t0 = performance.now();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  if (steadyHero) ctx.drawImage(sceneBgCanvas, 0, 0);
  else if (bgCanvas) ctx.drawImage(bgCanvas, 0, 0);
  ctx.setTransform(dpr * scale, 0, 0, dpr * scale, ox * dpr, oy * dpr);
  prof('paper', t0);

  // Floating ambient particles
  particles.forEach(p => p.draw(ctx, nightMode));

  t0 = performance.now();
  if (gallery) {
    renderGallery(dt);
  } else if (mode === 'hero') {
    if (trans) {
      renderTransition();
    } else if (steadyHero) {
      renderHeroScene(curKey, curCurtain, curShadow, 0, 0, 1, true);
    } else {
      const op = introT >= 0 ? easeOutCubic(introT) : 1;
      renderHeroScene(curKey, curCurtain, curShadow, 0, 0, op, false);
      if (introT < 0 && !trans) compositeSceneBg(curKey);   // prime steady path
    }
  }
  prof('scene', t0);
  t0 = performance.now();
  drawHintPlate();
  drawCursor();
  prof('cursor', t0);
  if (PROF.on) PROF.n++;
}

/* restrained paper plate behind the bottom hint — a soft paper-tone radial
   fade drawn in canvas (no glassmorphism), keeps the hint legible over
   curtain tails in every scene, incl. gallery */
let hintPlateCanvas = null;
function drawHintPlate() {
  if (elHint.classList.contains('faded')) return;
  if (document.body.classList.contains('mobile')) return;
  if (!hintPlateCanvas) {
    hintPlateCanvas = document.createElement('canvas');
    hintPlateCanvas.width = 340; hintPlateCanvas.height = 56;
    const c = hintPlateCanvas.getContext('2d');
    c.translate(170, 28);
    c.scale(1, 28 / 170);
    const g = c.createRadialGradient(0, 0, 8, 0, 0, 170);
    g.addColorStop(0, 'rgba(240,232,217,0.82)');
    g.addColorStop(0.55, 'rgba(240,232,217,0.5)');
    g.addColorStop(1, 'rgba(240,232,217,0)');
    c.fillStyle = g;
    c.fillRect(-170, -170, 340, 340);
  }
  ctx.save();
  ctx.setTransform(dpr * scale, 0, 0, dpr * scale, ox * dpr, oy * dpr);
  ctx.drawImage(hintPlateCanvas, 924 - 170, 1066 - 28);
  ctx.restore();
}

/* ---------- main loop with visibility pause ---------- */
let lastTs = -1, running = true;
function frame(ts) {
  requestAnimationFrame(frame);
  if (!running) { lastTs = -1; return; }
  if (lastTs < 0) lastTs = ts;
  const dt = clamp((ts - lastTs) / 1000, 0, 0.05);
  lastTs = ts;
  nowSec = ts / 1000;
  const t0 = performance.now();
  update(dt);
  prof('update', t0);
  render(dt);
}
document.addEventListener('visibilitychange', () => {
  running = !document.hidden;
});

/* ---------- read-only debug hooks (verification only; no physics writes) ---------- */
window.__DBG = {
  version: 'v2-visual-refresh',
  scene: () => curKey,
  mode: () => mode,
  topY: key => SCENES[key].topY,
  anchors: () => (curCurtain ? curCurtain.anchors.map(a => [a.x, a.y]) : null),
  sample: (cols, rows) => (curCurtain ? cols.map(c => rows.map(r => {
    const p = curCurtain.pts[c][r]; return [p.x, p.y];
  })) : null),
  reset: () => { if (curCurtain) curCurtain.reset(); },
  roofUsingImage: () => ORDER.map(k => !!(ROOFS[k] && ROOFS[k].img)),
  ready: true
};

preloadRoofs().then(() => {
  boot();
  requestAnimationFrame(frame);
  // reveal only after the first frames are painted (no first-frame flash)
  setTimeout(() => {
    const veil = document.getElementById('veil');
    if (veil) {
      veil.classList.add('hide');
      setTimeout(() => veil.remove(), 500);
    }
  }, 120);
});
</script>
