<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WHISPERING EAVES — Building Eaves + Text Curtain</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect x='3' y='3' width='10' height='10' transform='rotate(45 8 8)' fill='none' stroke='%23A64A2A' stroke-width='1.4'/%3E%3C/svg%3E">
<style>
/* ============================================================
   WHISPERING EAVES — aged-paper editorial stage
   Design baseline 1848x1080. #ui lives in design coordinates,
   scaled by JS with the same transform used for the canvas.
   ============================================================ */
html, body {
  margin: 0; padding: 0; height: 100%;
  overflow: hidden;
  background: #E8DECB; /* warm uncoated paper — fills the whole window */
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#stage {
  position: absolute; left: 0; top: 0;
  display: block;
  cursor: none;                 /* custom cursor drawn on canvas */
  touch-action: none;           /* pointer events drive the curtain */
}
#ui {
  position: absolute;
  width: 1848px; height: 1080px;
  transform-origin: 0 0;
  pointer-events: none;         /* only .interactive children take events */
  overflow: hidden;
  font-family: Georgia, "Times New Roman", "Noto Serif", serif;
  color: #211A15;
}
#ui .interactive { pointer-events: auto; }

/* ---------- header ---------- */
header.top {
  position: absolute; left: 100px; top: 36px; height: 44px;
  display: flex; align-items: center; gap: 38px;
  transition: opacity .25s ease;
}
.brand {
  display: flex; align-items: center; gap: 12px;
  font-style: italic; font-size: 15.5px; letter-spacing: .045em;
  color: #211A15; white-space: nowrap;
}
.seal {
  width: 8px; height: 8px; flex: 0 0 auto;
  border: 1.4px solid #A64A2A;
  transform: rotate(45deg);
}
nav {
  display: flex; gap: 4px; align-items: center;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Courier New", monospace;
}
nav a, nav span {
  position: relative;
  font-size: 11px; letter-spacing: .18em; color: #65543D;
  text-decoration: none; cursor: pointer; white-space: nowrap;
  padding: 14px 11px;                 /* >=44px tall hit target */
  transition: color .18s ease;
}
nav a::after {                        /* active destination marker */
  content: ""; position: absolute; left: 11px; right: 11px; bottom: 7px;
  height: 1.5px; background: #A64A2A;
  transform: scaleX(0); transform-origin: left center;
  transition: transform .22s ease;
}
nav a:hover { color: #211A15; }
nav a.active { color: #211A15; }
nav a.active::after { transform: scaleX(1); }
nav span { cursor: default; opacity: .72; }
#destReadout {
  display: flex; align-items: baseline; gap: 10px;
  padding-left: 34px; margin-left: 2px;
  border-left: 1px solid rgba(101,84,61,.32);
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Courier New", monospace;
  white-space: nowrap;
}
#destReadout .rnum { font-size: 11px; letter-spacing: .14em; color: #A64A2A; }
#destReadout .rname { font-size: 11px; letter-spacing: .22em; color: #211A15; }
#topControls {
  position: absolute; right: 100px; top: 36px;
  display: flex; align-items: center; gap: 8px;
}
.ctrlBtn {
  width: 44px; height: 44px; box-sizing: border-box;
  display: flex; align-items: center; justify-content: center;
  background: transparent; color: #46392B;
  border: 1px solid rgba(101,84,61,.42); border-radius: 2px;
  cursor: pointer; transition: border-color .18s ease, color .18s ease; padding: 0;
}
.ctrlBtn svg { width: 18px; height: 18px; stroke: currentColor; }
.ctrlBtn:hover { border-color: #A64A2A; color: #211A15; }

#configure {
  box-sizing: border-box; min-height: 44px;
  display: flex; align-items: center; gap: 9px;
  background: transparent; color: #46392B;
  border: 1px solid rgba(101,84,61,.42); border-radius: 2px;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Courier New", monospace;
  font-size: 11px; letter-spacing: .18em;
  padding: 8px 18px;
  cursor: pointer; white-space: nowrap;
  transition: border-color .18s ease, color .18s ease;
}
#configure .rdot {
  width: 6px; height: 6px; flex: 0 0 auto;
  background: #A64A2A; transform: rotate(45deg);
}
#configure:hover { border-color: #A64A2A; color: #211A15; }

/* Modal overlay & options */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(20, 18, 15, 0.65); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .25s ease;
}
.modal-backdrop.open { opacity: 1; pointer-events: auto; }
.modal-card {
  width: 640px; max-width: 90vw; max-height: 85vh; overflow-y: auto;
  background: #F2E9D8; border: 1px solid #A64A2A; border-radius: 4px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3); padding: 28px 32px;
  font-family: Georgia, "Times New Roman", serif; color: #211A15;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(101,84,61,0.25); padding-bottom: 14px; margin-bottom: 20px;
}
.modal-header h2 { font-size: 16px; letter-spacing: .18em; margin: 0; font-weight: 600; color: #A64A2A; }
#modalClose { background: none; border: none; font-size: 24px; cursor: pointer; color: inherit; line-height: 1; padding: 0 8px; }
.modal-section { margin-bottom: 22px; }
.modal-section h3 { font-family: ui-monospace, monospace; font-size: 11px; letter-spacing: .15em; color: #65543D; margin: 0 0 10px 0; }
.dest-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
.dest-item {
  padding: 10px 8px; border: 1px solid rgba(101,84,61,0.3); text-align: center;
  cursor: pointer; border-radius: 2px; font-family: ui-monospace, monospace; font-size: 11px;
  transition: all .18s ease; background: rgba(255,255,255,0.3);
}
.dest-item:hover, .dest-item.active { border-color: #A64A2A; background: rgba(166,74,42,0.12); font-weight: 600; }

.custom-text-row { display: flex; gap: 8px; flex-wrap: wrap; }
.custom-text-row input {
  flex: 1; min-width: 200px; padding: 8px 12px; font-size: 13px; border: 1px solid rgba(101,84,61,0.4);
  border-radius: 2px; background: rgba(255,255,255,0.6); color: inherit;
}
.btn-primary, .btn-secondary {
  padding: 8px 14px; font-family: ui-monospace, monospace; font-size: 11px; letter-spacing: .12em;
  border-radius: 2px; cursor: pointer; transition: all .18s ease;
}
.btn-primary { background: #A64A2A; color: #FFF; border: none; }
.btn-primary:hover { background: #88381E; }
.btn-secondary { background: transparent; border: 1px solid rgba(101,84,61,0.4); color: inherit; }
.btn-secondary:hover { border-color: #A64A2A; color: #A64A2A; }
.row-split { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* Night Mode Global Theme Overrides */
body.theme-night {
  background: #121520 !important;
  color: #E8DFD0 !important;
}
body.theme-night #ui { color: #E8DFD0; }
body.theme-night nav a, body.theme-night nav span { color: #B0A088; }
body.theme-night nav a:hover, body.theme-night nav a.active { color: #FFF; }
body.theme-night #kicker, body.theme-night #desc, body.theme-night .csub { color: #C5B8A5; }
body.theme-night #title, body.theme-night .cname, body.theme-night #destReadout .rname { color: #FFF; }
body.theme-night .card .cframe { background: rgba(25, 30, 45, 0.8); border-color: rgba(230, 168, 69, 0.4); }
body.theme-night .card .cnum { background: rgba(25, 30, 45, 0.9); border-color: rgba(230, 168, 69, 0.3); color: #E6A845; }
body.theme-night .ctrlBtn, body.theme-night #configure { border-color: rgba(230, 168, 69, 0.4); color: #E8DFD0; }
body.theme-night .ctrlBtn:hover, body.theme-night #configure:hover { border-color: #E6A845; color: #FFF; }
body.theme-night #configure .rdot { background: #E6A845; }
body.theme-night .modal-card { background: #181B28; border-color: #E6A845; color: #E8DFD0; }
body.theme-night .modal-header h2 { color: #E6A845; }
body.theme-night .modal-section h3 { color: #B0A088; }
body.theme-night .dest-item { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); }
body.theme-night .dest-item:hover, body.theme-night .dest-item.active { border-color: #E6A845; background: rgba(230,168,69,0.18); color: #FFF; }
body.theme-night .custom-text-row input { background: rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.2); }

/* Weather Selector Grid */
.weather-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.weather-btn {
  padding: 8px 4px; font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: .12em;
  border: 1px solid rgba(101,84,61,0.3); border-radius: 2px; background: transparent; cursor: pointer; color: inherit;
  transition: all .18s ease; text-align: center;
}
.weather-btn:hover, .weather-btn.active { border-color: #A64A2A; background: rgba(166,74,42,0.12); font-weight: 600; }
.theme-night .weather-btn:hover, .theme-night .weather-btn.active { border-color: #E6A845; background: rgba(230,168,69,0.18); color: #FFF; }

/* Cultural Hotspots */
#hotspotLayer { position: absolute; inset: 0; pointer-events: none; z-index: 20; }
.hotspot {
  position: absolute; pointer-events: auto; cursor: pointer; z-index: 20;
  display: flex; align-items: center; justify-content: center; width: 30px; height: 30px;
  transform: translate(-50%, -50%); transition: transform .2s ease;
}
.hotspot-dot {
  width: 9px; height: 9px; background: #A64A2A; border-radius: 50%;
  box-shadow: 0 0 0 3px rgba(166,74,42,0.3); transition: all .2s ease;
}
.theme-night .hotspot-dot { background: #E6A845; box-shadow: 0 0 0 3px rgba(230,168,69,0.3); }
.hotspot:hover .hotspot-dot { transform: scale(1.4); background: #211A15; }
.theme-night .hotspot:hover .hotspot-dot { background: #FFF; }
.hotspot-pulse {
  position: absolute; width: 24px; height: 24px; border-radius: 50%;
  border: 1px solid #A64A2A; animation: hpulse 2s infinite; opacity: 0.6;
}
@keyframes hpulse { 0% { transform: scale(0.6); opacity: 0.8; } 100% { transform: scale(1.8); opacity: 0; } }

/* Lore Scroll Modal */
#loreModal .modal-card { width: 520px; text-align: left; }
.lore-body { font-size: 14px; line-height: 1.65; font-family: Georgia, serif; color: #46392B; margin-top: 10px; }
.theme-night .lore-body { color: #C5B8A5; }
.lore-tag { font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: .18em; color: #A64A2A; margin-bottom: 6px; }
.theme-night .lore-tag { color: #E6A845; }

/* Zen Mode Overrides */
body.zen-active #hdr, body.zen-active #kicker, body.zen-active #title, body.zen-active #desc,
body.zen-active #cardL, body.zen-active #cardR, body.zen-active #hint, body.zen-active #mswitch,
body.zen-active #topControls > *:not(#zenToggle), body.zen-active #hotspotLayer {
  opacity: 0 !important; pointer-events: none !important; transition: opacity .4s ease;
}

/* visible keyboard focus everywhere */
.interactive:focus-visible, nav a:focus-visible, #configure:focus-visible, .ctrlBtn:focus-visible,
.card:focus-visible, .door:focus-visible {
  outline: 2px solid #A64A2A; outline-offset: 3px;
}

/* ---------- hero copy ---------- */
#kicker {
  position: absolute; left: 100px; top: 498px; width: 520px;
  font-size: 12px; letter-spacing: .18em; color: #65543D;
  white-space: nowrap;
  transition: opacity .25s ease;
}
#title {
  position: absolute; left: 100px; top: 526px; width: 580px;
  font-family: "Libre Bodoni", "Cormorant Garamond", Didot, "Bodoni MT", Georgia, "Times New Roman", serif;
  font-size: 56px; line-height: 1.05; font-weight: 500;
  color: #211A15; letter-spacing: 0;
  transition: opacity .25s ease;
}
#desc {
  position: absolute; left: 1448px; top: 892px; width: 300px;
  font-family: "Helvetica Neue", Helvetica, Arial, "Segoe UI", sans-serif;
  font-size: 14px; line-height: 1.5; color: #46392B;
  transition: opacity .25s ease;
}

/* ---------- side destination cards (editorial) ---------- */
.card {
  position: absolute; width: 150px; top: 248px;
  cursor: pointer;
  transition: opacity .25s ease;
}
#cardL { left: 102px; }
#cardR { left: 1596px; }              /* 1848-102-150: symmetric with left */
.card .cframe {
  position: relative;
  width: 150px; height: 140px; box-sizing: border-box;
  border: 1px solid rgba(101,84,61,.38);
  background: rgba(240,232,217,.5);
  overflow: hidden;
  transition: border-color .21s ease;
}
.card .cframe img {
  width: 100%; height: 100%; display: block;
  object-fit: cover; object-position: 50% 42%;
  transform: scale(1);
  transition: transform .21s ease;
}
.card .cnum {
  position: absolute; left: 0; top: 0;
  padding: 4px 7px;
  background: rgba(240,232,217,.88);
  border-right: 1px solid rgba(101,84,61,.28);
  border-bottom: 1px solid rgba(101,84,61,.28);
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 10px; letter-spacing: .12em; color: #A64A2A;
}
.card:hover .cframe, .card:focus-visible .cframe { border-color: #A64A2A; }
.card:hover .cframe img { transform: scale(1.02); }
/* graceful image fallback: never expose broken-image icons or alt text */
.card .cframe img.imgdead, .mchip img.imgdead { visibility: hidden; }
.card .cframe.noimg::after {
  content: attr(data-mono);
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 12px; letter-spacing: .18em; color: #A64A2A; text-align: center;
}
.card .cmeta {
  padding-top: 10px;
  display: grid; grid-template-columns: 1fr auto; align-items: end;
}
.card .cname {
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 11px; letter-spacing: .2em; color: #211A15;
}
.card .csub {
  grid-column: 1; margin-top: 5px;
  font-size: 10px; letter-spacing: .1em; color: #65543D;
  white-space: nowrap;
}
.card .carrow {
  grid-column: 2; grid-row: 1 / span 2;
  width: 30px; height: 12px; align-self: center;
  color: #65543D;
  transition: color .21s ease, transform .21s ease;
}
.card:hover .carrow { color: #A64A2A; }
#cardR:hover .carrow { transform: translateX(3px); }
#cardL:hover .carrow { transform: translateX(-3px); }

/* ---------- bottom hint ---------- */
#hint {
  position: absolute; left: 924px; top: 1058px;
  transform: translateX(-50%);
  display: flex; align-items: center; gap: 12px;
  font-size: 10.5px; letter-spacing: .28em; color: #65543D;
  white-space: nowrap;
  transition: opacity .25s ease;
}
#hint .hicon {
  width: 44px; height: 10px; flex: 0 0 auto;
  color: #65543D;
}

/* ---------- gallery ---------- */
.door {
  position: absolute; width: 380px; height: 640px; top: 220px;
  cursor: pointer;
  transition: opacity .3s ease, transform .3s ease;
}
.door .gcap {
  position: absolute; left: 0; right: 0; top: 600px;
  text-align: center;
}
.door .gname {
  font-family: "Libre Bodoni", "Cormorant Garamond", Didot, "Bodoni MT", Georgia, "Times New Roman", serif;
  font-size: 15px; letter-spacing: .06em; color: #211A15;
}
.door .gkick {
  margin-top: 5px;
  font-size: 9.5px; letter-spacing: .16em; color: #65543D;
  white-space: nowrap;
}

/* ---------- loading veil (quiet paper placeholder) ---------- */
#veil {
  position: fixed; inset: 0; z-index: 60;
  background:
    radial-gradient(ellipse 120% 90% at 50% 42%, #F0E8D9 0%, #E8DECB 62%, #E2D8C1 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px;
  transition: opacity .32s ease;
}
#veil.hide { opacity: 0; pointer-events: none; }
#veil .vmark {
  font-family: Georgia, "Times New Roman", serif;
  font-style: italic; font-size: 15px; letter-spacing: .06em; color: #211A15;
}
#veil .vmark::before {
  content: ""; display: inline-block;
  width: 8px; height: 8px; margin-right: 11px;
  border: 1.4px solid #A64A2A; transform: rotate(45deg) translateY(-1px);
}
#veil .vline {
  width: 44px; height: 1px; background: rgba(101,84,61,.4);
}

/* ---------- mobile bottom destination switcher (screen-space DOM) ---------- */
#mswitch {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 40;
  display: none;
  justify-content: center; gap: 8px;
  padding: 8px 10px calc(8px + env(safe-area-inset-bottom, 0px));
  background: rgba(240,232,217,.94);
  border-top: 1px solid rgba(101,84,61,.3);
  box-sizing: border-box;
}
body.mobile #mswitch { display: flex; }
.mchip {
  flex: 1 1 0; max-width: 118px;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  min-height: 44px; padding: 6px 4px;
  border: 1px solid rgba(101,84,61,.35); border-radius: 2px;
  background: transparent; cursor: pointer;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  transition: border-color .2s ease;
}
.mchip img {
  width: 100%; max-width: 64px; height: 34px; display: block;
  object-fit: cover; object-position: 50% 42%;
  border: 1px solid rgba(101,84,61,.25);
}
.mchip .mtxt { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.mchip .mnum { font-size: 8.5px; letter-spacing: .12em; color: #A64A2A; }
.mchip .mname { font-size: 9px; letter-spacing: .1em; color: #211A15; white-space: nowrap; }
.mchip.active { border-color: #A64A2A; box-shadow: inset 0 0 0 1px rgba(166,74,42,.35); }
.mchip:focus-visible { outline: 2px solid #A64A2A; outline-offset: 2px; }

/* ---------- fade helpers (JS toggles) ---------- */
.faded { opacity: 0 !important; }

/* ---------- mobile (real composition: unscaled DOM chrome in screen px) ---------- */
.mobile .card, .mobile #desc, .mobile #destReadout, .mobile #hint { display: none; }
.mobile header.top { left: 16px; top: 10px; gap: 14px; height: 44px; }
.mobile .brand { font-size: 14px; }
.mobile nav { display: none; }
.mobile #configure {
  right: 12px; top: 8px; min-height: 44px;
  padding: 8px 12px; font-size: 10px; letter-spacing: .14em;
}
.mobile #kicker {
  left: 16px; top: 62px; width: 86vw; white-space: normal;
  font-size: 10px; letter-spacing: .13em; line-height: 1.5;
}
.mobile #title {
  left: 16px; top: 98px; width: 84vw;
  font-size: 25px; line-height: 1.12; letter-spacing: 0;
}
.mobile .door .gcap { top: 94%; }
.mobile .door .gname { font-size: 13px; }
.mobile .door .gkick { font-size: 8.5px; white-space: normal; }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="ui">
  <header class="top" id="hdr">
    <div class="brand"><span class="seal"></span><span>WHISPERING EAVES</span></div>
    <nav>
      <a id="navHome" class="interactive" tabindex="0" role="button">Home</a>
      <a id="navDest" class="interactive" tabindex="0" role="button">Destinations</a>
      <span>Community</span>
    </nav>
    <div id="destReadout"><span class="rnum" id="readNum">01</span><span class="rname" id="readName">CHINA</span></div>
  </header>
  <div id="topControls">
    <button id="zenToggle" class="ctrlBtn interactive" aria-label="Toggle Zen Mode" title="Zen Mode (Keyboard: Z)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
    <button id="themeToggle" class="ctrlBtn interactive" aria-label="Toggle Night/Day Mode" title="Toggle Night/Day Mode">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke-width="1.8"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke-width="1.8" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button id="audioToggle" class="ctrlBtn interactive" aria-label="Toggle Audio" title="Toggle Atmospheric Sound">
      <svg class="icon-audio-off" viewBox="0 0 24 24" fill="none" stroke-width="1.8"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
      <svg class="icon-audio-on" viewBox="0 0 24 24" fill="none" stroke-width="1.8" style="display:none;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    </button>
    <div id="configure" class="interactive" tabindex="0" role="button" aria-label="Route Index"><span class="rdot"></span><span>ROUTE INDEX</span></div>
  </div>

  <div id="hotspotLayer"></div>

  <div id="kicker"></div>
  <div id="title"></div>

<script>
'use strict';

/* ============================================================
   1. Utilities
   ============================================================ */
const W = 1848, H = 1080;            // design baseline
const TAU = Math.PI * 2;
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp  = (a, b, t) => a + (b - a) * t;
const easeInCubic  = t => t * t * t;
const easeInQuad   = t => t * t;
const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
const easeOutBack  = (t, s) => { s = s || 1.15; const u = t - 1; return 1 + (s + 1) * u * u * u + s * u * u; };
const smoothstep = (a, b, x) => { const t = clamp((x - a) / (b - a), 0, 1); return t * t * (3 - 2 * t); };

function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

const REDUCED = (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) || false;

/* ============================================================
   1b. Audio Engine, Particles, Night Theme & Option Handlers
   ============================================================ */
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.muted = true;
    this.masterGain = null;
    this.scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00];
    this.lastChimeTime = 0;
  }
  init() {
    if (this.ctx) return;
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    this.ctx = new AudioCtx();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = this.muted ? 0 : 0.35;
    this.masterGain.connect(this.ctx.destination);
  }
  toggle() {
    this.init();
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
    this.muted = !this.muted;
    if (this.masterGain) {
      this.masterGain.gain.setValueAtTime(this.muted ? 0 : 0.35, this.ctx.currentTime);
    }
    return !this.muted;
  }
  playChime(colRatio, force) {
    if (this.muted || !this.ctx) return;
    const now = this.ctx.currentTime;
    if (now - this.lastChimeTime < 0.05) return;
    this.lastChimeTime = now;

    const idx = Math.floor(colRatio * this.scale.length) % this.scale.length;
    const freq = this.scale[idx];
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();

    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, now);

    const dur = 0.5 + Math.random() * 0.4;
    const vol = Math.min(0.18, (force || 1) * 0.06);

    gain.gain.setValueAtTime(0.001, now);
    gain.gain.exponentialRampToValueAtTime(vol, now + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);

    osc.connect(gain);
    gain.connect(this.masterGain);

    osc.start(now);
    osc.stop(now + dur + 0.05);
  }
  playAmbientNote(key) {
    if (this.muted || !this.ctx) return;
    const now = this.ctx.currentTime;
    const notes = {
      china: [261.63, 329.63, 392.00, 523.25],
      japan: [293.66, 329.63, 440.00, 587.33],
      kazakhstan: [220.00, 293.66, 392.00, 440.00],
      uzbekistan: [261.63, 311.13, 392.00, 466.16],
      turkiye: [220.00, 261.63, 329.63, 392.00]
    };
    const sceneNotes = notes[key] || notes.china;
    const freq = sceneNotes[Math.floor(Math.random() * sceneNotes.length)];
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();

    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, now);

    gain.gain.setValueAtTime(0.001, now);
    gain.gain.exponentialRampToValueAtTime(0.035, now + 0.2);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 2.4);

    osc.connect(gain);
    gain.connect(this.masterGain);

    osc.start(now);
    osc.stop(now + 2.5);
  }
}

const audio = new AudioEngine();

let weatherMode = 'spring';

class FloatingParticle {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : -20;
    this.size = 2 + Math.random() * 4;
    this.vx = 0.3 + Math.random() * 0.7;
    this.vy = weatherMode === 'rain' ? 8 + Math.random() * 6 : 0.2 + Math.random() * 0.5;
    this.rot = Math.random() * TAU;
    this.vrot = (Math.random() - 0.5) * 0.03;
    this.opacity = 0.12 + Math.random() * 0.35;
  }
  update(dt, windForce) {
    const wx = weatherMode === 'rain' ? -2.5 : windForce * 1.4;
    this.x += (this.vx + wx) * dt * 60;
    this.y += this.vy * dt * 60;
    this.rot += this.vrot * dt * 60;
    if (this.x > W + 40 || this.y > H + 40 || this.x < -40) this.reset(false);
  }
  draw(ctx, night) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.globalAlpha = this.opacity;
    if (weatherMode === 'spring') {
      ctx.fillStyle = night ? '#E8B4C8' : '#D9829C';
      ctx.beginPath(); ctx.ellipse(0, 0, this.size, this.size * 0.55, 0, 0, TAU); ctx.fill();
    } else if (weatherMode === 'autumn') {
      ctx.fillStyle = night ? '#E59866' : '#C0392B';
      ctx.beginPath(); ctx.ellipse(0, 0, this.size * 1.2, this.size * 0.7, 0, 0, TAU); ctx.fill();
    } else if (weatherMode === 'winter') {
      ctx.fillStyle = night ? '#FFFFFF' : '#E5E8E8';
      ctx.beginPath(); ctx.arc(0, 0, this.size * 0.7, 0, TAU); ctx.fill();
    } else if (weatherMode === 'rain') {
      ctx.strokeStyle = night ? 'rgba(174,214,241,0.45)' : 'rgba(93,173,226,0.35)';
      ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-4, 14); ctx.stroke();
    }
    ctx.restore();
  }
}

let nightMode = false;

function toggleTheme(forceNight) {

/* ============================================================
   2. Stage, coordinate system, resize
   ============================================================ */
const stage = document.getElementById('stage');
const ctx   = stage.getContext('2d');
const ui    = document.getElementById('ui');

let vw = 0, vh = 0, dpr = 1, scale = 1, ox = 0, oy = 0;
let bgCanvas = null;   // full-window device-res paper surface (no letterbox bands)

function resize() {
  vw = window.innerWidth; vh = window.innerHeight;
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  stage.width  = Math.max(1, Math.round(vw * dpr));
  stage.height = Math.max(1, Math.round(vh * dpr));
  stage.style.width  = vw + 'px';
  stage.style.height = vh + 'px';
  const mobile = vw < 760;
  if (mobile) {
    /* real mobile composition: scale to the SCENE column (roof+curtain),
       centered on design x=924 — never a shrunken letterbox of the stage */
    scale = Math.min(vw / 820, (vh - 360) / 980);
    ox = vw / 2 - 924 * scale;
    oy = vh * 0.54 - 570 * scale;
    ui.style.left = '0px';
    ui.style.top = '0px';
    ui.style.width = vw + 'px';
    ui.style.height = vh + 'px';
    ui.style.transform = 'none';          // DOM chrome uses screen px on mobile
  } else {
    scale = Math.min(vw / W, vh / H);
    ox = (vw - W * scale) / 2;
    oy = (vh - H * scale) / 2;
    ui.style.left = ox + 'px';
    ui.style.top = oy + 'px';
    ui.style.width = W + 'px';
    ui.style.height = H + 'px';
    ui.style.transform = 'scale(' + scale + ')';
  }
  ui.classList.toggle('mobile', mobile);
  document.body.classList.toggle('mobile', mobile);
  buildPaper();
  layoutMobileDoors();
  // display-resolution caches must be rebuilt for the new scale
  roofDispCache.clear();
  roofMiniCache.clear();
  sceneBgKey = null;
  if (typeof curShadow !== 'undefined' && curShadow) curShadow.dirty = true;
  if (typeof curCurtain !== 'undefined' && curCurtain) curCurtain.rebuildSprites();
  if (typeof trans !== 'undefined' && trans && trans.fromCurtain) trans.fromCurtain.rebuildSprites();
  if (typeof gallery !== 'undefined' && gallery) {
    // recreate minis: door centers depend on the viewport (mobile compression)
    gallery.items = ORDER.map((key, i) => makeMini(key, i));
  }
}

let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(resize, 120);
});

/* Pointer (client px) -> design px */
function toDesign(clientX, clientY) {
  return { x: (clientX - ox) / scale, y: (clientY - oy) / scale };
}

/* ============================================================
   3. Paper background (static grain, baked once per resize)
   ============================================================ */
function buildGrainTile() {
  const t = document.createElement('canvas');
  t.width = t.height = 256;
  const c = t.getContext('2d');
  const img = c.createImageData(256, 256);
  const d = img.data;
  const rnd = mulberry32(0x51A7);
  for (let i = 0; i < d.length; i += 4) {
    const r = rnd();
    if (r > 0.988) {                 // sparse lighter fiber speck
      d[i] = 255; d[i + 1] = 250; d[i + 2] = 236;
      d[i + 3] = 10 + rnd() * 9;
    } else {                         // fine dark grain (extremely subtle)
      d[i] = 40; d[i + 1] = 30; d[i + 2] = 18;
      d[i + 3] = rnd() * 9;
    }
  }
  c.putImageData(img, 0, 0);
  // a few short 1px fiber strokes
  c.strokeStyle = 'rgba(96,76,50,0.05)';
  c.lineWidth = 1;
  for (let i = 0; i < 20; i++) {
    const x = rnd() * 256, y = rnd() * 256;
    const a = rnd() * TAU, l = 3 + rnd() * 9;
    c.beginPath();
    c.moveTo(x, y);
    c.lineTo(x + Math.cos(a) * l, y + Math.sin(a) * l);
    c.stroke();
  }
  return t;
}
const grainTile = buildGrainTile();

/* Full-window paper surface: the design-ratio stage is centered at (ox,oy),
   but gradient/grain/vignette extend across the ENTIRE window so there are
   no letterbox bands — the paper simply continues past the stage edges. */
function buildPaper() {
  bgCanvas = document.createElement('canvas');
  bgCanvas.width  = stage.width;
  bgCanvas.height = stage.height;
  const p = bgCanvas.getContext('2d');
  p.setTransform(dpr, 0, 0, dpr, 0, 0);

  // stage-center in window coords anchors the gradient
  const cxw = ox + W * scale * 0.5, cyw = oy + H * scale * 0.42;
  const rw = H * scale * 0.95;

  if (nightMode) {
    const rg = p.createRadialGradient(cxw, cyw, H * scale * 0.08, cxw, cyw, rw);
    rg.addColorStop(0, '#1E2333');
    rg.addColorStop(0.62, '#151825');
    rg.addColorStop(1, '#0E101A');
    p.fillStyle = rg;
    p.fillRect(0, 0, vw, vh);

    const vg = p.createRadialGradient(cxw, oy + H * scale * 0.46, H * scale * 0.34,
                                      cxw, oy + H * scale * 0.52, H * scale * 1.06);
    vg.addColorStop(0, 'rgba(212,175,55,0.04)');
    vg.addColorStop(1, 'rgba(0,0,0,0.55)');
    p.fillStyle = vg;
    p.fillRect(0, 0, vw, vh);
  } else {
    // vertical+radial hybrid base (#E8DECB -> #F0E8D9)
    const rg = p.createRadialGradient(cxw, cyw, H * scale * 0.08, cxw, cyw, rw);
    rg.addColorStop(0, '#F0E8D9');
    rg.addColorStop(0.62, '#E9DFCC');
    rg.addColorStop(1, '#E3D9C2');
    p.fillStyle = rg;
    p.fillRect(0, 0, vw, vh);
    const lg = p.createLinearGradient(0, cyw, 0, vh);
    lg.addColorStop(0, 'rgba(120,95,60,0)');
    lg.addColorStop(1, 'rgba(120,95,60,0.06)');
    p.fillStyle = lg;
    p.fillRect(0, 0, vw, vh);

    // faint irregular warm stains
    const rnd = mulberry32(0xBEEF);
    for (let i = 0; i < 3; i++) {
      const sx = vw * (0.18 + rnd() * 0.64), sy = vh * (0.15 + rnd() * 0.7);
      const sr = (180 + rnd() * 320) * Math.max(scale, 0.55);
      const sg = p.createRadialGradient(sx, sy, 0, sx, sy, sr);
      sg.addColorStop(0, 'rgba(158,120,72,0.03)');
      sg.addColorStop(1, 'rgba(158,120,72,0)');
      p.fillStyle = sg;
      p.fillRect(sx - sr, sy - sr, sr * 2, sr * 2);
    }

    // static grain pattern (full window)
    p.fillStyle = p.createPattern(grainTile, 'repeat');
    p.fillRect(0, 0, vw, vh);

    // vignette (gentle — tactile, never gray or faded)
    const vg = p.createRadialGradient(cxw, oy + H * scale * 0.46, H * scale * 0.34,
                                      cxw, oy + H * scale * 0.52, H * scale * 1.06);
    vg.addColorStop(0, 'rgba(90,70,45,0)');
    vg.addColorStop(1, 'rgba(90,70,45,0.10)');
    p.fillStyle = vg;
    p.fillRect(0, 0, vw, vh);
  }
}

/* ============================================================
   4. Procedural roofs (offscreen canvases @2x, reused by thumbs)
   ============================================================ */
const ROOF_SS = 2; // supersample factor -> crisp at DPR 2

function roofCanvas(w, h) {
  const cv = document.createElement('canvas');
  cv.width = Math.round(w * ROOF_SS);
  cv.height = Math.round(h * ROOF_SS);
  const c = cv.getContext('2d');
  c.scale(ROOF_SS, ROOF_SS);
  c.lineJoin = 'round';
  c.lineCap = 'round';
  return { cv, c };
}
/* soft silhouette edge so roofs sit INTO the paper */
function featherRoof(raw, w, h) {
  const out = document.createElement('canvas');
  out.width = raw.width; out.height = raw.height;
  const c = out.getContext('2d');
  let blurred = false;
  try {
    c.filter = 'blur(1.1px)';
    c.globalAlpha = 0.5;
    c.drawImage(raw, 0, 0);
    blurred = true;
  } catch (e) { blurred = false; }
  c.filter = 'none';
  c.globalAlpha = 1;
  c.drawImage(raw, 0, 0);
  if (!blurred) { /* sharp only — still fine */ }
  return out;
}
function sampleCurve(fn, n) {
  const a = [];
  for (let i = 0; i <= n; i++) a.push(fn(i / n));
  return a;
}
function pathThrough(c, pts, close) {
  c.beginPath();
  c.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) c.lineTo(pts[i].x, pts[i].y);
  if (close) c.closePath();
}
function lerpPt(a, b, t) { return { x: lerp(a.x, b.x, t), y: lerp(a.y, b.y, t) }; }

/* ------------------------------------------------------------
   4a. CHINA — double-eave golden palace roof (重檐)
   bbox 680 x 300 (design px). Lower flying eave underside ~262,
   curtain tucks in behind the shadow zone below it.
   ------------------------------------------------------------ */
function buildChinaRoof() {
  const RW = 680, RH = 300;
  const { cv, c } = roofCanvas(RW, RH);
  const rnd = mulberry32(20240117);
  const wob = () => (rnd() - 0.5) * 1.3;

  /* ---- silhouette curves ---- */
  // lower tier: top boundary (partially hidden behind band) and flying eave
  const lTop = t => {
    const u = Math.abs(t - 0.5) * 2;
    return { x: lerp(22, 658, t), y: 178 + 26 * Math.pow(u, 3.0) };
  };
  const lEave = t => {
    const u = Math.abs(t - 0.5) * 2;
    return { x: lerp(6, 674, t), y: 252 - (12 * u + 34 * Math.pow(u, 6)) };
  };
  // upper tier (plane top tucks 4-6px UNDER the main ridge bar)
  const uTop = t => {
    const u = Math.abs(t - 0.5) * 2;
    return { x: lerp(166, 514, t), y: 54 + 10 * Math.pow(u, 2.6) };
  };
  const uEave = t => {
    const u = Math.abs(t - 0.5) * 2;
    return { x: lerp(100, 580, t), y: 158 - (10 * u + 30 * Math.pow(u, 6)) };
  };

  /* ============ LOWER TIER roof plane ============ */
  let pts = sampleCurve(lTop, 24);
  const lEavePts = sampleCurve(lEave, 48);
  c.beginPath();
  c.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) c.lineTo(pts[i].x, pts[i].y);
  for (let i = lEavePts.length - 1; i >= 0; i--) c.lineTo(lEavePts[i].x, lEavePts[i].y);
  c.closePath();
  let g = c.createLinearGradient(0, 170, 0, 258);
  g.addColorStop(0, '#e8b84b');
  g.addColorStop(0.55, '#d39a33');
  g.addColorStop(1, '#b57a22');
  c.fillStyle = g;
  c.fill();

  /* tile ridge lines, fanning from top boundary to eave lip */
  const NT = 116;
  for (let i = 0; i < NT; i++) {
    const t = (i + 0.5) / NT;
    const p0 = lTop(t), p1 = lEave(t);
    const out = (t - 0.5) * 2;                 // fan outward toward corners
    const mx = (p0.x + p1.x) / 2 + out * 5 + wob();
    const my = (p0.y + p1.y) / 2 + 7 + wob();  // concave sag of the slope
    c.strokeStyle = i % 5 === 0 ? 'rgba(226,170,70,0.42)' : 'rgba(160,106,28,0.50)';
    c.lineWidth = 1.15;
    c.beginPath();
    c.moveTo(p0.x + wob(), p0.y + wob());
    c.quadraticCurveTo(mx, my, p1.x + wob(), p1.y + wob());
    c.stroke();
    // taper: fainter lower third
    c.strokeStyle = 'rgba(160,106,28,0.22)';
    const q0 = lerpPt(p0, p1, 0.62), q1 = lerpPt(p0, p1, 0.99);
    c.beginPath();
    c.moveTo(q0.x, q0.y);
    c.quadraticCurveTo(lerp(mx, q1.x, 0.5), lerp(my, q1.y, 0.5), q1.x, q1.y);
    c.stroke();
  }
  /* horizontal tile courses */
  for (let k = 1; k <= 6; k++) {
    const s = k / 7;
    const row = [];
    for (let i = 0; i <= 40; i++) {
      const t = i / 40;
      const p = lerpPt(lTop(t), lEave(t), s);
      p.y += 4 * Math.sin(Math.PI * s);
      row.push(p);
    }
    c.strokeStyle = 'rgba(138,90,26,0.25)';
    c.lineWidth = 1;
    pathThrough(c, row);
    c.stroke();
  }

  /* lower hip ridges (visible wing top edges) + ridge beasts */
  const drawLowerHip = (t0, t1) => {
    const seg = [];
    for (let i = 0; i <= 10; i++) seg.push(lTop(lerp(t0, t1, i / 10)));
    c.strokeStyle = '#9a6a20';
    c.lineWidth = 4.2;
    pathThrough(c, seg); c.stroke();
    c.strokeStyle = 'rgba(232,184,75,0.85)';
    c.lineWidth = 1.4;
    const segUp = seg.map(p => ({ x: p.x, y: p.y - 1.6 }));
    pathThrough(c, segUp); c.stroke();
    // beasts: small dots decreasing toward the corner + front figure
    for (let b = 0; b < 5; b++) {
      const bt = lerp(t0, t1, 0.3 + b * 0.14);
      const p = lTop(bt);
      const r = 3.1 - b * 0.38;
      c.fillStyle = '#8a5c1c';
      c.beginPath(); c.arc(p.x, p.y - 3.4, r, 0, TAU); c.fill();
      c.fillStyle = 'rgba(232,184,75,0.7)';
      c.beginPath(); c.arc(p.x - 0.7, p.y - 4.4, r * 0.4, 0, TAU); c.fill();
    }
    const pf = lTop(lerp(t0, t1, 0.12));
    c.fillStyle = '#8a5c1c';
    c.beginPath(); c.arc(pf.x, pf.y - 4.2, 3.8, 0, TAU); c.fill();   // immortal figure
    c.fillRect(pf.x - 3, pf.y - 2.4, 6, 2.6);                        // its little base
  };
  drawLowerHip(0.005, 0.185);
  drawLowerHip(0.815, 0.995);

  /* eave-end dark band + semicircular tile-end caps */
  const eaveBandPts = lEavePts.map(p => ({ x: p.x, y: p.y - 6 }));
  c.strokeStyle = 'rgba(122,72,18,0.5)';
  c.lineWidth = 9;
  pathThrough(c, eaveBandPts); c.stroke();
  for (let t = 0.012; t < 0.995; t += 0.0162) {
    const p = lEave(t);
    c.fillStyle = '#8a5a1a';
    c.beginPath();
    c.arc(p.x + wob() * 0.5, p.y - 2.4, 2.7, Math.PI, 0); // semicircle cap
    c.fill();
    c.strokeStyle = 'rgba(90,31,20,0.8)';
    c.lineWidth = 1;
    c.beginPath();                                    // drip tile hint
    c.moveTo(p.x + 4.6, p.y - 1);
    c.lineTo(p.x + 4.6, p.y + 2.6);
    c.stroke();
  }

  /* fascia board + rafter ends under the lower eave */
  const fasTop = lEavePts.map(p => ({ x: p.x, y: p.y + 1.5 }));
  const fasBot = lEavePts.map(p => ({ x: p.x, y: p.y + 9.5 }));
  c.beginPath();
  c.moveTo(fasTop[0].x, fasTop[0].y);
  for (let i = 1; i < fasTop.length; i++) c.lineTo(fasTop[i].x, fasTop[i].y);
  for (let i = fasBot.length - 1; i >= 0; i--) c.lineTo(fasBot[i].x, fasBot[i].y);
  c.closePath();
  c.fillStyle = '#5a1f14';
  c.fill();
  for (let row = 0; row < 2; row++) {
    const off = 13.5 + row * 5;
    c.fillStyle = 'rgba(202,164,106,' + (0.72 - row * 0.22) + ')';
    for (let t = 0.02; t < 0.99; t += 0.0098) {
      const p = lEave(t);
      c.beginPath();
      c.arc(p.x, p.y + off, 1.15, 0, TAU);
      c.fill();
    }
  }

  /* ============ DOUGONG band (tucked UNDER the upper eave — no paper gap) ============ */
  const bx0 = 134, bx1 = 546, by1 = 205;
  const bandTopY = x => uEave((x - 100) / 480).y + 4;   // top edge follows the eave, tucked 4px under its lip
  const topPts = [];
  for (let x = bx0; x <= bx1; x += 6) topPts.push({ x, y: bandTopY(x) });
  c.beginPath();
  c.moveTo(bx0, topPts[0].y);
  for (let i = 1; i < topPts.length; i++) c.lineTo(topPts[i].x, topPts[i].y);
  c.lineTo(bx1 - 4, by1);
  c.quadraticCurveTo((bx0 + bx1) / 2, by1 + 4, bx0 + 4, by1);
  c.closePath();
  c.fillStyle = '#7c2f1c';
  c.fill();
  c.save();
  c.clip();
  // deep warm shadow on the band's top portion (cast by the upper eave)
  const ushad = c.createLinearGradient(0, 138, 0, 188);
  ushad.addColorStop(0, 'rgba(42,13,6,0.68)');
  ushad.addColorStop(0.55, 'rgba(42,13,6,0.35)');
  ushad.addColorStop(1, 'rgba(42,13,6,0)');
  c.fillStyle = ushad;
  c.fillRect(bx0, 136, bx1 - bx0, 54);
  // blue-green accent stripe following the curved top edge
  c.strokeStyle = '#3d5a55';
  c.lineWidth = 3.2;
  pathThrough(c, topPts.map(p => ({ x: p.x, y: p.y + 10 })));
  c.stroke();
  c.strokeStyle = 'rgba(20,40,38,0.6)';
  c.lineWidth = 1.2;
  pathThrough(c, topPts.map(p => ({ x: p.x, y: p.y + 13.4 })));
  c.stroke();
  // bracket clusters, y following the curved top
  const step = 16.4;
  for (let x = bx0 + 12; x < bx1 - 6; x += step) {
    const by0 = bandTopY(x) + 15;
    c.fillStyle = '#b0522c';
    c.fillRect(x - 7, by0 + 7, 14, 3.4);        // cap block
    c.fillStyle = '#a04a28';
    c.fillRect(x - 5.5, by0 + 11.4, 11, 3.1);   // corbel step 1
    c.fillRect(x - 4, by0 + 15.4, 8, 3);        // corbel step 2
    c.fillRect(x - 9.2, by0 + 12, 3.2, 2.4);    // arm L
    c.fillRect(x + 6, by0 + 12, 3.2, 2.4);      // arm R
    c.fillStyle = '#5a1c10';
    c.fillRect(x - 3.2, by0 + 19.4, 6.4, 5);    // base block
    c.fillStyle = 'rgba(232,150,90,0.35)';      // top edge light on cap
    c.fillRect(x - 7, by0 + 7, 14, 1.1);
    c.fillStyle = 'rgba(30,8,4,0.45)';          // gap shadow
    c.fillRect(x + step / 2 - 1.1, by0 + 6, 1.6, by1 - by0 - 10);
  }
  // side shading
  let bs = c.createLinearGradient(bx0, 0, bx0 + 60, 0);
  bs.addColorStop(0, 'rgba(40,12,6,0.5)'); bs.addColorStop(1, 'rgba(40,12,6,0)');
  c.fillStyle = bs; c.fillRect(bx0, 140, 60, by1 - 140 + 4);
  bs = c.createLinearGradient(bx1, 0, bx1 - 60, 0);
  bs.addColorStop(0, 'rgba(40,12,6,0.55)'); bs.addColorStop(1, 'rgba(40,12,6,0)');
  c.fillStyle = bs; c.fillRect(bx1 - 60, 140, 60, by1 - 140 + 4);
  c.fillStyle = 'rgba(30,8,4,0.8)';
  c.fillRect(bx0 + 2, by1 - 1.6, bx1 - bx0 - 4, 1.8);   // band bottom line
  c.restore();

  /* ============ UPPER TIER roof plane ============ */
  pts = sampleCurve(uTop, 20);
  const uEavePts = sampleCurve(uEave, 40);
  c.beginPath();
  c.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) c.lineTo(pts[i].x, pts[i].y);
  for (let i = uEavePts.length - 1; i >= 0; i--) c.lineTo(uEavePts[i].x, uEavePts[i].y);
  c.closePath();
  g = c.createLinearGradient(0, 58, 0, 164);
  g.addColorStop(0, '#eab94c');
  g.addColorStop(0.55, '#d49c34');
  g.addColorStop(1, '#b57a22');
  c.fillStyle = g;
  c.fill();

  const NTU = 88;
  for (let i = 0; i < NTU; i++) {
    const t = (i + 0.5) / NTU;
    const p0 = uTop(t), p1 = uEave(t);
    const out = (t - 0.5) * 2;
    const mx = (p0.x + p1.x) / 2 + out * 4 + wob();
    const my = (p0.y + p1.y) / 2 + 6 + wob();
    c.strokeStyle = i % 5 === 0 ? 'rgba(228,172,72,0.45)' : 'rgba(160,106,28,0.52)';
    c.lineWidth = 1.1;
    c.beginPath();
    c.moveTo(p0.x + wob(), p0.y + wob());
    c.quadraticCurveTo(mx, my, p1.x + wob(), p1.y + wob());
    c.stroke();
  }
  for (let k = 1; k <= 4; k++) {
    const s = k / 5;
    const row = [];
    for (let i = 0; i <= 32; i++) {
      const t = i / 32;
      const p = lerpPt(uTop(t), uEave(t), s);
      p.y += 3 * Math.sin(Math.PI * s);
      row.push(p);
    }
    c.strokeStyle = 'rgba(138,90,26,0.25)';
    c.lineWidth = 1;
    pathThrough(c, row); c.stroke();
  }

  /* upper hip ridges with beast rows */
  const drawUpperHip = (x0, y0, cx0, cy0, x1, y1) => {
    const seg = [];
    for (let i = 0; i <= 12; i++) {
      const t = i / 12, u = 1 - t;
      seg.push({
        x: u * u * x0 + 2 * u * t * cx0 + t * t * x1,
        y: u * u * y0 + 2 * u * t * cy0 + t * t * y1
      });
    }
    c.strokeStyle = '#9a6a20';
    c.lineWidth = 4.6;
    pathThrough(c, seg); c.stroke();
    c.strokeStyle = 'rgba(232,184,75,0.9)';
    c.lineWidth = 1.5;
    pathThrough(c, seg.map(p => ({ x: p.x, y: p.y - 1.7 }))); c.stroke();
    // 5 walking beasts decreasing toward corner + immortal at front
    for (let b = 0; b < 5; b++) {
      const p = seg[Math.round(lerp(4, 10, b / 4))];
      const r = 3.2 - b * 0.4;
      c.fillStyle = '#8a5c1c';
      c.beginPath(); c.arc(p.x, p.y - 3.6, r, 0, TAU); c.fill();
      c.fillStyle = 'rgba(232,184,75,0.75)';
      c.beginPath(); c.arc(p.x - 0.7, p.y - 4.6, r * 0.42, 0, TAU); c.fill();
    }
    const pf = seg[11];
    c.fillStyle = '#8a5c1c';
    c.beginPath(); c.arc(pf.x, pf.y - 4.6, 4, 0, TAU); c.fill();
    c.fillRect(pf.x - 3.2, pf.y - 2.6, 6.4, 2.8);
  };
  drawUpperHip(174, 62, 128, 90, 101, 120);
  drawUpperHip(506, 62, 552, 90, 579, 120);

  /* upper eave-end band + caps + fascia + rafters */
  const uBandPts = uEavePts.map(p => ({ x: p.x, y: p.y - 5.5 }));
  c.strokeStyle = 'rgba(122,72,18,0.5)';
  c.lineWidth = 8;
  pathThrough(c, uBandPts); c.stroke();
  for (let t = 0.015; t < 0.99; t += 0.0205) {
    const p = uEave(t);
    c.fillStyle = '#8a5a1a';
    c.beginPath();
    c.arc(p.x + wob() * 0.5, p.y - 2.2, 2.5, Math.PI, 0);
    c.fill();
  }
  const ufT = uEavePts.map(p => ({ x: p.x, y: p.y + 1.5 }));
  const ufB = uEavePts.map(p => ({ x: p.x, y: p.y + 8.5 }));
  c.beginPath();
  c.moveTo(ufT[0].x, ufT[0].y);
  for (let i = 1; i < ufT.length; i++) c.lineTo(ufT[i].x, ufT[i].y);
  for (let i = ufB.length - 1; i >= 0; i--) c.lineTo(ufB[i].x, ufB[i].y);
  c.closePath();
  c.fillStyle = '#5a1f14';
  c.fill();
  /* soffit: dark warm underside hugging the upper eave along its FULL width,
     thickening toward the flying corners — the overhang never floats over paper */
  const sofB = uEavePts.map(p => {
    const uu = Math.abs(p.x - 340) / 240;
    return { x: p.x, y: p.y + 8 + 15 * Math.pow(uu, 3) };
  });
  c.beginPath();
  c.moveTo(uEavePts[0].x, uEavePts[0].y + 7.5);
  for (let i = 1; i < uEavePts.length; i++) c.lineTo(uEavePts[i].x, uEavePts[i].y + 7.5);
  for (let i = sofB.length - 1; i >= 0; i--) c.lineTo(sofB[i].x, sofB[i].y);
  c.closePath();
  g = c.createLinearGradient(0, 148, 0, 180);
  g.addColorStop(0, 'rgba(42,13,6,0.85)');
  g.addColorStop(1, 'rgba(42,13,6,0.45)');
  c.fillStyle = g;
  c.fill();

  /* extra AO cast down the recessed dougong band top (band width only) */
  const aoT = [], aoB = [];
  for (let x = bx0; x <= bx1; x += 8) {
    aoT.push({ x, y: bandTopY(x) + 5 });
    aoB.push({ x, y: bandTopY(x) + 27 });
  }
  c.beginPath();
  c.moveTo(aoT[0].x, aoT[0].y);
  for (let i = 1; i < aoT.length; i++) c.lineTo(aoT[i].x, aoT[i].y);
  for (let i = aoB.length - 1; i >= 0; i--) c.lineTo(aoB[i].x, aoB[i].y);
  c.closePath();
  g = c.createLinearGradient(0, 150, 0, 198);
  g.addColorStop(0, 'rgba(46,14,6,0.5)');
  g.addColorStop(1, 'rgba(46,14,6,0)');
  c.fillStyle = g;
  c.fill();

  /* rafter-tail dots ON the dark soffit */
  c.fillStyle = 'rgba(202,164,106,0.65)';
  for (let t = 0.025; t < 0.98; t += 0.0135) {
    const p = uEave(t);
    c.beginPath(); c.arc(p.x, p.y + 12, 1.05, 0, TAU); c.fill();
  }

  /* ============ main ridge + chiwen ============ */
  const rx0 = 170, rx1 = 510, ry = 46;
  c.beginPath();
  c.moveTo(rx0, ry);
  c.quadraticCurveTo((rx0 + rx1) / 2, ry - 4.5, rx1, ry);
  c.lineTo(rx1, ry + 16);                                   // deep skirt: sits ON the plane
  c.quadraticCurveTo((rx0 + rx1) / 2, ry + 11, rx0, ry + 16);
  c.closePath();
  g = c.createLinearGradient(0, ry - 4, 0, ry + 17);
  g.addColorStop(0, '#a57422');
  g.addColorStop(0.55, '#8a5c1a');
  g.addColorStop(1, '#6e460e');
  c.fillStyle = g;
  c.fill();
  c.strokeStyle = 'rgba(232,184,75,0.85)';
  c.lineWidth = 1.6;
  c.beginPath();
  c.moveTo(rx0 + 2, ry - 0.5);
  c.quadraticCurveTo((rx0 + rx1) / 2, ry - 5, rx1 - 2, ry - 0.5);
  c.stroke();
  c.strokeStyle = 'rgba(60,35,10,0.35)';                    // skirt bottom seam
  c.lineWidth = 1.2;
  c.beginPath();
  c.moveTo(rx0 + 1, ry + 14.5);
  c.quadraticCurveTo((rx0 + rx1) / 2, ry + 10, rx1 - 1, ry + 14.5);
  c.stroke();
  for (let x = rx0 + 26; x < rx1 - 10; x += 26) {   // ridge section ticks
    c.strokeStyle = 'rgba(60,35,10,0.45)';
    c.lineWidth = 1.4;
    c.beginPath();
    c.moveTo(x, ry + 1.5);
    c.lineTo(x, ry + 13.5);
    c.stroke();
  }
  const drawChiwen = (x, flip) => {
    c.save();
    c.translate(x, ry + 9);
    c.scale(flip, 1);
    c.beginPath();
    c.moveTo(-11, 4);
    c.quadraticCurveTo(-14, -8, -10, -20);
    c.quadraticCurveTo(-6, -32, 4, -32.5);
    c.quadraticCurveTo(11.5, -31, 10.5, -23.5);
    c.quadraticCurveTo(9.5, -17, 3.5, -18);
    c.quadraticCurveTo(7.5, -11, 8.5, -2);
    c.lineTo(11, 4);
    c.closePath();
    g = c.createLinearGradient(0, -33, 0, 5);
    g.addColorStop(0, '#a57422');
    g.addColorStop(1, '#6e460e');
    c.fillStyle = g;
    c.fill();
    c.strokeStyle = 'rgba(232,184,75,0.85)';
    c.lineWidth = 1.4;
    c.beginPath();
    c.moveTo(-10.5, 2);
    c.quadraticCurveTo(-13.2, -8, -9.4, -19.5);
    c.quadraticCurveTo(-5.6, -30.8, 4, -31.4);
    c.stroke();
    c.strokeStyle = 'rgba(70,40,10,0.6)';          // inner curl groove
    c.lineWidth = 1.2;
    c.beginPath();
    c.moveTo(8.5, -24);
    c.quadraticCurveTo(5.5, -22, 4, -19);
    c.stroke();
    c.restore();
  };
  drawChiwen(rx0 + 2, 1);
  drawChiwen(rx1 - 2, -1);

  /* ============ global shading / lighting (clipped to silhouette) ============ */
  c.globalCompositeOperation = 'source-atop';
  // right-side warm shadow
  let sg = c.createLinearGradient(RW * 0.3, 0, RW, 0);
  sg.addColorStop(0, 'rgba(120,70,25,0)');
  sg.addColorStop(1, 'rgba(84,42,12,0.20)');
  c.fillStyle = sg;
  c.fillRect(0, 0, RW, RH);
  // left-top gentle light
  sg = c.createLinearGradient(0, 0, RW * 0.45, RH * 0.4);
  sg.addColorStop(0, 'rgba(255,238,196,0.10)');
  sg.addColorStop(1, 'rgba(255,238,196,0)');
  c.fillStyle = sg;
  c.fillRect(0, 0, RW, RH);
  c.globalCompositeOperation = 'source-over';
  // deep shadow beneath the lower eave (curtain tucks in behind this)
  const shPts = sampleCurve(lEave, 40).map(p => ({ x: p.x, y: p.y + 10 }));
  c.beginPath();
  c.moveTo(shPts[0].x, shPts[0].y);
  for (let i = 1; i < shPts.length; i++) c.lineTo(shPts[i].x, shPts[i].y);
  for (let i = shPts.length - 1; i >= 0; i--) c.lineTo(shPts[i].x, shPts[i].y + 34);
  c.closePath();
  sg = c.createLinearGradient(0, 258, 0, 306);
  sg.addColorStop(0, 'rgba(58,20,8,0.62)');
  sg.addColorStop(1, 'rgba(58,20,8,0)');
  c.fillStyle = sg;
  c.fill();
  // flying-corner tips catch the light
  c.strokeStyle = 'rgba(244,214,140,0.8)';
  c.lineWidth = 2;
  [[0.0, 0.05], [0.95, 1.0]].forEach(rg2 => {
    const seg = [];
    for (let i = 0; i <= 5; i++) {
      const p = lEave(lerp(rg2[0], rg2[1], i / 5));
      seg.push({ x: p.x, y: p.y - 3 });
    }
    pathThrough(c, seg); c.stroke();
  });

  return { canvas: featherRoof(cv, RW, RH), w: RW, h: RH };
}

/* ------------------------------------------------------------
   4b. JAPAN — vermilion temple roof, thin & spreading
   bbox 640 x 170. Eave underside ~local 138; AO extends to 160.
   ------------------------------------------------------------ */
function buildJapanRoof() {
  const RW = 640, RH = 170;
  const { cv, c } = roofCanvas(RW, RH);
  const rnd = mulberry32(0x1E7A);
  const wob = () => (rnd() - 0.5) * 1.1;

  const jTop = t => {
    const u = Math.abs(t - 0.5) * 2;
    return { x: lerp(58, 582, t), y: 42 + 7 * Math.pow(u, 2.2) };
  };
  const jEave = t => {
    const u = Math.abs(t - 0.5) * 2;
    return { x: lerp(8, 632, t), y: 124 - (8 * u + 26 * Math.pow(u, 6)) };
  };

  /* roof plane */
  const topPts = sampleCurve(jTop, 24);
  const eavePts = sampleCurve(jEave, 48);
  c.beginPath();
  c.moveTo(topPts[0].x, topPts[0].y);
  for (let i = 1; i < topPts.length; i++) c.lineTo(topPts[i].x, topPts[i].y);
  for (let i = eavePts.length - 1; i >= 0; i--) c.lineTo(eavePts[i].x, eavePts[i].y);
  c.closePath();
  let g = c.createLinearGradient(0, 36, 0, 130);
  g.addColorStop(0, '#c33a24');
  g.addColorStop(0.6, '#a02a18');
  g.addColorStop(1, '#8a2412');
  c.fillStyle = g;
  c.fill();

  /* horizontal tile courses following the curve, slight undulation */
  for (let k = 1; k <= 9; k++) {
    const s = k / 10;
    const row = [];
    for (let i = 0; i <= 48; i++) {
      const t = i / 48;
      const p = lerpPt(jTop(t), jEave(t), s);
      p.y += Math.sin(t * 38 + k * 2.1) * 1.0 + 3 * Math.sin(Math.PI * s);
      row.push(p);
    }
    c.strokeStyle = 'rgba(116,28,14,' + (0.38 + 0.10 * (k % 2)) + ')';
    c.lineWidth = 1.1;
    pathThrough(c, row); c.stroke();
  }
  /* faint vertical seams */
  c.strokeStyle = 'rgba(124,31,16,0.20)';
  c.lineWidth = 1;
  for (let i = 1; i < 26; i++) {
    const t = i / 26;
    const p0 = jTop(t), p1 = jEave(t);
    c.beginPath();
    c.moveTo(p0.x + wob(), p0.y + wob());
    c.quadraticCurveTo((p0.x + p1.x) / 2, (p0.y + p1.y) / 2 + 4, p1.x + wob(), p1.y + wob());
    c.stroke();
  }
  /* subtle material undulation patches */
  for (let i = 0; i < 5; i++) {
    const px = 80 + rnd() * 480, py = 55 + rnd() * 55, pr = 30 + rnd() * 40;
    const pg = c.createRadialGradient(px, py, 0, px, py, pr);
    pg.addColorStop(0, 'rgba(255,170,120,0.05)');
    pg.addColorStop(1, 'rgba(255,170,120,0)');
    c.fillStyle = pg;
    c.fillRect(px - pr, py - pr, pr * 2, pr * 2);
  }

  /* main ridge — thick near-black bar with tile segmentation */
  const rx0 = 52, rx1 = 588, ry = 26;
  c.beginPath();
  c.moveTo(rx0, ry + 2);
  c.quadraticCurveTo((rx0 + rx1) / 2, ry - 3, rx1, ry + 2);
  c.lineTo(rx1, ry + 15);
  c.quadraticCurveTo((rx0 + rx1) / 2, ry + 11, rx0, ry + 15);
  c.closePath();
  c.fillStyle = '#241a14';
  c.fill();
  c.strokeStyle = 'rgba(120,80,55,0.5)';           // faint top light on black ridge
  c.lineWidth = 1.4;
  c.beginPath();
  c.moveTo(rx0 + 3, ry + 1.4);
  c.quadraticCurveTo((rx0 + rx1) / 2, ry - 3.4, rx1 - 3, ry + 1.4);
  c.stroke();
  for (let x = rx0 + 18; x < rx1 - 8; x += 18) {   // rounded ridge-tile ticks
    c.strokeStyle = 'rgba(0,0,0,0.55)';
    c.lineWidth = 2;
    c.beginPath();
    c.moveTo(x, ry + 3);
    c.lineTo(x, ry + 13);
    c.stroke();
    c.strokeStyle = 'rgba(140,95,60,0.28)';
    c.lineWidth = 1;
    c.beginPath();
    c.moveTo(x + 1.6, ry + 3);
    c.lineTo(x + 1.6, ry + 13);
    c.stroke();
  }
  /* onigawara stubs — small dark curls at ridge ends with gold edge */
  const oni = (x, flip) => {
    c.save();
    c.translate(x, ry + 8);
    c.scale(flip, 1);
    c.beginPath();
    c.moveTo(-7, 6);
    c.quadraticCurveTo(-11, -4, -6, -12);
    c.quadraticCurveTo(-1, -17, 5, -14);
    c.quadraticCurveTo(1, -10, 1.5, -5);
    c.lineTo(6, 6);
    c.closePath();
    c.fillStyle = '#241a14';
    c.fill();
    c.strokeStyle = '#c9982a';
    c.lineWidth = 1.3;
    c.beginPath();
    c.moveTo(-6.4, 4);
    c.quadraticCurveTo(-10, -4, -5.6, -11.4);
    c.stroke();
    c.restore();
  };
  oni(rx0 - 2, 1);
  oni(rx1 + 2, -1);

  /* under-eave dark band + tiny rafter dots */
  const bT = eavePts.map(p => ({ x: p.x, y: p.y + 1 }));
  const bB = eavePts.map(p => ({ x: p.x, y: p.y + 14 }));
  c.beginPath();
  c.moveTo(bT[0].x, bT[0].y);
  for (let i = 1; i < bT.length; i++) c.lineTo(bT[i].x, bT[i].y);
  for (let i = bB.length - 1; i >= 0; i--) c.lineTo(bB[i].x, bB[i].y);
  c.closePath();
  c.fillStyle = '#33150d';
  c.fill();
  c.fillStyle = 'rgba(210,160,110,0.5)';
  for (let t = 0.03; t < 0.98; t += 0.012) {
    const p = jEave(t);
    c.beginPath(); c.arc(p.x, p.y + 9, 0.95, 0, TAU); c.fill();
  }

  /* gold crests at the two upturned corners */
  [0.004, 0.996].forEach(t => {
    const p = jEave(t);
    c.fillStyle = '#c9982a';
    c.beginPath(); c.arc(p.x, p.y - 3, 4, 0, TAU); c.fill();
    c.strokeStyle = 'rgba(60,35,10,0.7)';
    c.lineWidth = 1;
    c.beginPath(); c.arc(p.x, p.y - 3, 4, 0, TAU); c.stroke();
    c.fillStyle = '#8a5c1c';
    c.beginPath(); c.arc(p.x, p.y - 3, 1.5, 0, TAU); c.fill();
  });

  /* shading: left light, right + underside dark (clipped to silhouette) */
  c.globalCompositeOperation = 'source-atop';
  let sg = c.createLinearGradient(0, 0, RW, 0);
  sg.addColorStop(0, 'rgba(255,205,160,0.10)');
  sg.addColorStop(0.5, 'rgba(255,205,160,0)');
  sg.addColorStop(1, 'rgba(40,10,5,0.26)');
  c.fillStyle = sg;
  c.fillRect(0, 0, RW, RH);
  c.globalCompositeOperation = 'source-over';
  const shPts = eavePts.map(p => ({ x: p.x, y: p.y + 14 }));
  c.beginPath();
  c.moveTo(shPts[0].x, shPts[0].y);
  for (let i = 1; i < shPts.length; i++) c.lineTo(shPts[i].x, shPts[i].y);
  for (let i = shPts.length - 1; i >= 0; i--) c.lineTo(shPts[i].x, shPts[i].y + 22);
  c.closePath();
  sg = c.createLinearGradient(0, 132, 0, 168);
  sg.addColorStop(0, 'rgba(40,12,6,0.5)');
  sg.addColorStop(1, 'rgba(40,12,6,0)');
  c.fillStyle = sg;
  c.fill();

  return { canvas: featherRoof(cv, RW, RH), w: RW, h: RH };
}

/* ------------------------------------------------------------
   4c. KAZAKHSTAN — white yurt dome with shanyrak
   bbox 560 x 262. Dome base ~local 250, band 218-250.
   ------------------------------------------------------------ */
function buildKazakhRoof() {
  const RW = 560, RH = 262;
  const { cv, c } = roofCanvas(RW, RH);
  const rnd = mulberry32(0xCA2A);
  const wob = () => (rnd() - 0.5) * 1.0;

  const APEX = { x: 280, y: 34 };
  const BASE_Y = 250, BL = 30, BR = 530;

  /* dome silhouette: slightly pointed apex (khan yurt profile) */
  const domePath = () => {
    c.beginPath();
    c.moveTo(BL, BASE_Y);
    c.bezierCurveTo(58, 150, 168, 52, APEX.x - 8, APEX.y);
    c.quadraticCurveTo(APEX.x, APEX.y - 3, APEX.x + 8, APEX.y);
    c.bezierCurveTo(392, 52, 502, 150, BR, BASE_Y);
    c.closePath();
  };

  domePath();
  let g = c.createLinearGradient(60, 40, 520, 250);
  g.addColorStop(0, '#f2ede2');
  g.addColorStop(0.55, '#e6dfd0');
  g.addColorStop(1, '#d8d2c2');
  c.fillStyle = g;
  c.fill();

  c.save();
  domePath();
  c.clip();

  /* soft light near upper-left */
  let lg2 = c.createRadialGradient(220, 110, 10, 220, 110, 260);
  lg2.addColorStop(0, 'rgba(255,252,242,0.5)');
  lg2.addColorStop(1, 'rgba(255,252,242,0)');
  c.fillStyle = lg2;
  c.fillRect(0, 0, RW, RH);

  /* felt speckle */
  for (let i = 0; i < 900; i++) {
    const x = rnd() * RW, y = rnd() * RH;
    c.fillStyle = rnd() > 0.5 ? 'rgba(120,110,92,0.05)' : 'rgba(255,255,250,0.06)';
    c.fillRect(x, y, 1.4, 1.4);
  }
  /* two large soft darker patches near base */
  [[150, 225, 90], [410, 228, 100]].forEach(p => {
    const pg = c.createRadialGradient(p[0], p[1], 0, p[0], p[1], p[2]);
    pg.addColorStop(0, 'rgba(148,138,118,0.10)');
    pg.addColorStop(1, 'rgba(148,138,118,0)');
    c.fillStyle = pg;
    c.fillRect(p[0] - p[2], p[1] - p[2], p[2] * 2, p[2] * 2);
  });

  /* shanyrak — skylight ring at apex (slight perspective ellipse) */
  const SH = { x: APEX.x, y: APEX.y + 26, r: 34, ry: 28 };
  // radiating uyk poles first (they pass under the ring)
  const NPOLE = 13;
  const poleBase = i => ({ x: lerp(48, 512, i / (NPOLE - 1)), y: BASE_Y + 2 });
  for (let i = 0; i < NPOLE; i++) {
    const a = lerp(Math.PI * 0.14, Math.PI * 0.86, i / (NPOLE - 1));
    const rim = { x: SH.x + Math.cos(a) * (SH.r - 2), y: SH.y + Math.sin(a) * (SH.ry - 2) };
    const base = poleBase(i);
    const mid = { x: (rim.x + base.x) / 2 + (base.x - SH.x) * 0.10 + wob(), y: (rim.y + base.y) / 2 + 14 };
    c.strokeStyle = 'rgba(168,152,128,0.8)';
    c.lineWidth = 2.5;
    c.beginPath();
    c.moveTo(rim.x, rim.y);
    c.quadraticCurveTo(mid.x, mid.y, base.x, base.y);
    c.stroke();
    // alternating faint lighter felt band between poles
    if (i % 2 === 0) {
      c.strokeStyle = 'rgba(255,255,255,0.10)';
      c.lineWidth = 7;
      const a2 = lerp(Math.PI * 0.14, Math.PI * 0.86, (i + 0.5) / (NPOLE - 1));
      const rim2 = { x: SH.x + Math.cos(a2) * (SH.r + 4), y: SH.y + Math.sin(a2) * (SH.ry + 4) };
      const base2 = poleBase(i + 0.5 < NPOLE ? i : i);
      c.beginPath();
      c.moveTo(rim2.x, rim2.y);
      c.quadraticCurveTo((rim2.x + base2.x) / 2, (rim2.y + base2.y) / 2 + 14, base2.x, base2.y);
      c.stroke();
    }
  }

  /* waist band (baskur) with koshkar-muiz pattern */
  c.save();
  c.beginPath();
  c.rect(0, 216, RW, BASE_Y - 216);
  domePath();
  c.clip('evenodd' in c ? undefined : undefined); // guard: older engines lack param
  c.restore();
  // simpler: draw band rect then re-clip to dome via intersection
  c.save();
  domePath();
  c.clip();
  const bandY0 = 218, bandY1 = BASE_Y;
  c.fillStyle = '#8a3b22';
  c.fillRect(BL - 4, bandY0, BR - BL + 8, bandY1 - bandY0);
  // cream border lines
  c.strokeStyle = '#e8dcc4';
  c.lineWidth = 1.6;
  c.beginPath(); c.moveTo(BL - 2, bandY0 + 2.4); c.lineTo(BR + 2, bandY0 + 2.4); c.stroke();
  c.beginPath(); c.moveTo(BL - 2, bandY1 - 2.6); c.lineTo(BR + 2, bandY1 - 2.6); c.stroke();
  // ram-horn zigzag: alternating triangles + stepped diamonds
  c.fillStyle = '#e8dcc4';
  const pw = 22;
  for (let x = BL + 6, i = 0; x < BR - 10; x += pw, i++) {
    const ymid = (bandY0 + bandY1) / 2;
    if (i % 2 === 0) {
      c.beginPath();                       // up triangle
      c.moveTo(x, ymid + 7);
      c.lineTo(x + 8, ymid - 7);
      c.lineTo(x + 16, ymid + 7);
      c.closePath(); c.fill();
    } else {
      c.beginPath();                       // stepped diamond
      c.moveTo(x + 8, ymid - 7);
      c.lineTo(x + 15, ymid);
      c.lineTo(x + 8, ymid + 7);
      c.lineTo(x + 1, ymid);
      c.closePath(); c.fill();
      c.fillStyle = '#8a3b22';
      c.beginPath();                       // inner notch
      c.moveTo(x + 8, ymid - 3);
      c.lineTo(x + 11.5, ymid);
      c.lineTo(x + 8, ymid + 3);
      c.lineTo(x + 4.5, ymid);
      c.closePath(); c.fill();
      c.fillStyle = '#e8dcc4';
    }
  }
  c.restore();

  /* small hanging tassels below the band */
  c.strokeStyle = 'rgba(107,68,38,0.75)';
  c.lineWidth = 2;
  for (let x = BL + 26; x < BR - 10; x += 40) {
    c.beginPath();
    c.moveTo(x, BASE_Y - 1);
    c.lineTo(x + wob(), BASE_Y + 9);
    c.stroke();
    c.fillStyle = 'rgba(107,68,38,0.75)';
    c.beginPath(); c.arc(x + wob(), BASE_Y + 10, 1.6, 0, TAU); c.fill();
  }

  /* right-side soft shadow + AO under band */
  let sg = c.createLinearGradient(330, 0, BR + 10, 0);
  sg.addColorStop(0, 'rgba(138,130,114,0)');
  sg.addColorStop(1, 'rgba(138,130,114,0.25)');
  c.save();
  domePath(); c.clip();
  c.fillStyle = sg;
  c.fillRect(0, 0, RW, RH);
  c.restore();
  sg = c.createLinearGradient(0, BASE_Y, 0, BASE_Y + 12);
  sg.addColorStop(0, 'rgba(90,70,50,0.22)');
  sg.addColorStop(1, 'rgba(90,70,50,0)');
  c.fillStyle = sg;
  c.fillRect(BL, BASE_Y, BR - BL, 12);

  /* shanyrak ring on top of poles */
  c.strokeStyle = '#6b4426';
  c.lineWidth = 7;
  c.beginPath();
  c.ellipse(SH.x, SH.y, SH.r, SH.ry, 0, 0, TAU);
  c.stroke();
  c.strokeStyle = 'rgba(160,116,70,0.8)';      // lit upper rim
  c.lineWidth = 2;
  c.beginPath();
  c.ellipse(SH.x, SH.y - 1.2, SH.r - 3.5, SH.ry - 3.5, 0, Math.PI * 1.05, Math.PI * 1.95);
  c.stroke();
  // cross spokes
  c.strokeStyle = '#6b4426';
  c.lineWidth = 4;
  for (let k = 0; k < 4; k++) {
    const a = k * Math.PI / 2 + 0.32;
    c.beginPath();
    c.moveTo(SH.x + Math.cos(a) * 7, SH.y + Math.sin(a) * 6);
    c.quadraticCurveTo(
      SH.x + Math.cos(a + 0.35) * SH.r * 0.55, SH.y + Math.sin(a + 0.35) * SH.ry * 0.55,
      SH.x + Math.cos(a) * (SH.r - 3), SH.y + Math.sin(a) * (SH.ry - 3));
    c.stroke();
  }
  c.fillStyle = '#6b4426';
  c.beginPath();
  c.ellipse(SH.x, SH.y, 7, 6, 0, 0, TAU);
  c.fill();

  return { canvas: featherRoof(cv, RW, RH), w: RW, h: RH };
}

/* ------------------------------------------------------------
   4c2. UZBEKISTAN — Samarkand Registan Turquoise Portal
   ------------------------------------------------------------ */
function buildUzbekRoof() {
  const RW = 680, RH = 290;
  const { cv, c } = roofCanvas(RW, RH);

  mainGrad.addColorStop(0, '#1A6A88');

  c.fillStyle = mainGrad;

  c.strokeStyle = '#E8C872';

  c.beginPath();

  c.fillStyle = '#227896';
  c.fillRect(50, 20, 40, 260);

  c.beginPath();

  c.fillRect(60, 190, 560, 22);

  c.beginPath();
  c.moveTo(40, 190);
  c.lineTo(340, 150);
  c.lineTo(640, 190);
  c.lineTo(620, 205);
  c.lineTo(60, 205);
  c.closePath();
  c.fillStyle = '#A64A2A';

  c.strokeStyle = '#382518';
